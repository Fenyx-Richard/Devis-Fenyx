<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenyx Ouvertures — Devis Pro v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --navy:#0d1b2a; --navy2:#162235; --navy3:#1e2f45; --navy4:#253650;
  --copper:#c8782a; --copper-light:#e8a050; --gold:#d4a843;
  --text:#e8ddd0; --text-muted:#8a9ab0;
  --border:rgba(200,120,42,0.2); --radius:10px;
  --green:#1a6a3a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--text);min-height:100vh;font-size:13px;}

/* HEADER */
.app-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 4px 30px rgba(0,0,0,0.4);}
.app-header img{height:42px;filter:drop-shadow(0 0 10px rgba(200,120,42,0.5));}
.app-header-text h1{font-size:16px;font-weight:600;letter-spacing:3px;color:var(--copper-light);text-transform:uppercase;}
.app-header-text p{font-size:9px;color:var(--text-muted);letter-spacing:2px;}
.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;}

/* LAYOUT */
.app-body{display:flex;min-height:calc(100vh - 63px);}
.panel-form{width:58%;padding:20px;border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 63px);}
.panel-preview{width:42%;padding:20px;background:var(--navy2);overflow-y:auto;max-height:calc(100vh - 63px);}

/* SECTIONS */
.section{margin-bottom:20px;}
.section-title{font-size:10px;letter-spacing:3px;color:var(--copper);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-weight:600;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* FORMS */
.form-grid{display:grid;gap:8px;}
.g2{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr 1fr;} .g4{grid-template-columns:1fr 1fr 1fr 1fr;} .g1{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group label{font-size:10px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;}
.form-group input,.form-group select,.form-group textarea{background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--copper);box-shadow:0 0 0 2px rgba(200,120,42,0.1);}
.form-group textarea{resize:vertical;min-height:45px;}
select option{background:var(--navy3);}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.checkbox-row label{font-size:12px;color:var(--text);cursor:pointer;letter-spacing:0;text-transform:none;}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--copper);cursor:pointer;}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--navy3);padding:3px;border-radius:7px;}
.tab{flex:1;padding:6px;text-align:center;border-radius:5px;cursor:pointer;font-size:10px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;color:var(--text-muted);}
.tab.active{background:var(--copper);color:white;font-weight:600;}

/* PRODUCT CARD */
.product-card{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.product-card-header{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:rgba(0,0,0,0.15);border-bottom:1px solid var(--border);}
.product-card-header:hover{background:rgba(200,120,42,0.08);}
.card-num{background:var(--copper);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.card-title{flex:1;font-size:12px;font-weight:500;color:var(--copper-light);}
.card-subtitle{font-size:9px;color:var(--text-muted);}
.card-total{font-size:13px;color:var(--gold);font-weight:600;}
.card-toggle{color:var(--text-muted);font-size:11px;transition:transform 0.2s;}
.card-toggle.open{transform:rotate(180deg);}
.btn-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:15px;padding:2px 5px;border-radius:4px;transition:all 0.2s;}
.btn-del:hover{color:#e05555;background:rgba(224,85,85,0.1);}
.product-card-body{padding:12px;display:none;}
.product-card-body.open{display:block;}

/* CONFIGURATOR CASCADE */
.config-cascade{background:rgba(0,0,0,0.15);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.config-step{margin-bottom:8px;}
.config-step label{display:block;font-size:9px;letter-spacing:1.5px;color:var(--copper);text-transform:uppercase;margin-bottom:4px;}
.config-step select{width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;transition:border-color 0.2s;}
.config-step select:focus{border-color:var(--copper);}
.config-step select:disabled{opacity:0.4;cursor:not-allowed;}
.config-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.config-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.designation-box{background:var(--navy4);border:1px solid var(--copper);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--copper-light);font-style:italic;margin:8px 0;min-height:36px;line-height:1.5;}
.designation-box.empty{color:var(--text-muted);font-style:normal;}

/* SVG DRAWING */
.drawing-container{background:white;border-radius:6px;padding:8px;margin:8px 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.2s;font-weight:500;}
.btn-primary{background:linear-gradient(135deg,var(--copper),var(--copper-light));color:white;width:100%;justify-content:center;font-size:12px;padding:12px;box-shadow:0 4px 20px rgba(200,120,42,0.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(200,120,42,0.45);}
.btn-add{background:rgba(200,120,42,0.1);border:1px dashed var(--copper);color:var(--copper-light);width:100%;justify-content:center;margin-top:4px;}
.btn-add:hover{background:rgba(200,120,42,0.2);}
.btn-ghost{background:var(--navy3);border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--copper);color:var(--copper-light);}
.btn-sm{padding:5px 10px;font-size:10px;}

/* TAGS */
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.tag{background:rgba(200,120,42,0.1);border:1px solid rgba(200,120,42,0.3);color:var(--copper-light);border-radius:20px;padding:3px 10px;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.tag:hover{background:rgba(200,120,42,0.25);}

/* TOTAUX */
.totaux-box{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:14px;}
.totaux-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;color:var(--text-muted);border-bottom:1px solid rgba(255,255,255,0.04);}
.totaux-row.ttc{font-size:17px;color:var(--gold);font-weight:700;border-bottom:none;margin-top:5px;}

/* VOLET */
.volet-block{background:rgba(200,120,42,0.06);border:1px solid rgba(200,120,42,0.2);border-radius:8px;padding:10px;margin-top:6px;}

/* PREVIEW */
.preview-box{background:white;border-radius:8px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.5);color:#1a1a1a;font-size:11px;}
.prev-header{background:#0d1b2a;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.prev-header img{height:36px;}
.prev-header-r{text-align:right;color:white;}
.prev-co-name{font-size:13px;letter-spacing:3px;color:#c8a060;font-weight:600;}
.prev-co-sub{font-size:7px;color:#8a9ab0;letter-spacing:1px;}
.prev-co-contact{font-size:7px;color:#c0c8d4;margin-top:2px;}
.prev-body{padding:16px 18px;}
.prev-devis-title{font-size:15px;color:#0d1b2a;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid #c8782a;padding-bottom:5px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-end;}
.prev-num{font-size:9px;color:#c8782a;font-weight:400;}
.prev-client{background:#f8f4ef;border-left:3px solid #c8782a;padding:8px 12px;margin-bottom:12px;border-radius:0 6px 6px 0;}
.prev-client .lbl{font-size:7px;letter-spacing:1.5px;color:#888;text-transform:uppercase;}
.prev-client .val{font-size:10px;color:#1a1a1a;font-weight:500;}
.prev-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:10px;}
.prev-table th{background:#0d1b2a;color:#c8a060;padding:5px 7px;text-align:left;font-size:7px;letter-spacing:1px;text-transform:uppercase;}
.prev-table td{padding:5px 7px;border-bottom:1px solid #eee;vertical-align:top;}
.prev-table tr:nth-child(even) td{background:#faf8f5;}
.prev-table td.r{text-align:right;} .prev-table td.b{font-weight:700;}
.prev-totaux{display:flex;justify-content:flex-end;margin-bottom:10px;}
.prev-tot-box{width:180px;}
.prev-tot-row{display:flex;justify-content:space-between;padding:3px 0;font-size:9px;color:#555;border-bottom:1px solid #eee;}
.prev-tot-row.ttc{font-size:12px;color:#0d1b2a;font-weight:700;border-bottom:none;border-top:2px solid #c8782a;padding-top:5px;margin-top:3px;}
.prev-cond{background:#f8f4ef;border-radius:6px;padding:9px 12px;font-size:8px;color:#666;line-height:1.6;margin-bottom:8px;}
.prev-sigs{display:flex;gap:10px;margin-bottom:8px;}
.prev-sig{flex:1;border:1px solid #ddd;border-radius:4px;padding:6px;min-height:44px;font-size:7px;color:#aaa;letter-spacing:1px;}
.prev-footer{background:#0d1b2a;color:#8a9ab0;padding:7px 18px;text-align:center;font-size:7px;letter-spacing:1px;}
.prev-drawing{display:flex;gap:8px;justify-content:center;margin:4px 0;}
.prev-drawing-lbl{font-size:7px;color:#888;text-align:center;margin-top:2px;}

/* MISC */
.divider{height:1px;background:var(--border);margin:16px 0;}
.info-box{background:rgba(200,120,42,0.07);border:1px solid rgba(200,120,42,0.2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--text-muted);margin-bottom:10px;}

</head>
<body>

<header class="app-header">
  <img id="headerLogo" alt="Fenyx">
  <div class="app-header-text">
    <h1>Fenyx Ouvertures</h1>
    <p>Générateur de devis pro</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="reinitialiser()">🔄 Nouveau</button>
    <button class="btn btn-primary btn-sm" onclick="genererPDF()">📄 PDF</button>
  </div>
</header>

<div class="app-body">
  <div class="panel-form">
    <div class="section">
      <div class="section-title">Informations client</div>
      <div class="form-grid g2">
        <div class="form-group"><label>Nom / Prénom</label><input type="text" id="clientNom" placeholder="Martin Dupont" oninput="updatePreview()"></div>
        <div class="form-group"><label>Téléphone</label><input type="text" id="clientTel" placeholder="06 XX XX XX XX" oninput="updatePreview()"></div>
        <div class="form-group"><label>Email</label><input type="email" id="clientEmail" placeholder="email@exemple.fr" oninput="updatePreview()"></div>
        <div class="form-group"><label>Date du devis</label><input type="date" id="devisDate" oninput="updatePreview()"></div>
      </div>
      <div class="form-grid g1" style="margin-top:8px">
        <div class="form-group"><label>Adresse du chantier</label><input type="text" id="clientAdresse" placeholder="Numéro, rue, code postal, ville" oninput="updatePreview()"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Produits & Prestations</div>
      <div class="tag-row">
        <span class="tag" onclick="ajouterProduit('fenetre')">+ Fenêtre</span>
        <span class="tag" onclick="ajouterProduit('porte-fenetre')">+ Porte-fenêtre</span>
        <span class="tag" onclick="ajouterProduit('porte-entree')">+ Porte d'entrée</span>
        <span class="tag" onclick="ajouterProduit('baie')">+ Baie vitrée</span>
        <span class="tag" onclick="ajouterProduit('garage')">+ Porte de garage</span>
        <span class="tag" onclick="ajouterProduit('volet')">+ Volet roulant</span>
        <span class="tag" onclick="ajouterProduit('autre')">+ Autre</span>
      </div>
      <div id="produits-container"></div>
      <button class="btn btn-add" onclick="ajouterProduit('fenetre')">＋ Ajouter une ligne</button>
    </div>

    <div class="totaux-box">
      <div class="totaux-row"><span>Sous-total HT</span><span id="tot-ht">0,00 €</span></div>
      <div class="totaux-row"><span>TVA <span id="tva-label">10</span>%</span><span id="tot-tva">0,00 €</span></div>
      <div class="totaux-row" style="padding-top:5px">
        <span style="font-size:10px;color:var(--text-muted)">Taux TVA</span>
        <select id="tva-select" onchange="updatePreview()" style="background:var(--navy);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:5px;font-size:11px;">
          <option value="10">10% — Rénovation</option>
          <option value="20">20% — Standard</option>
          <option value="5.5">5,5% — Travaux</option>
        </select>
      </div>
      <div class="totaux-row ttc"><span>TOTAL TTC</span><span id="tot-ttc">0,00 €</span></div>
    </div>

    <div class="section" style="margin-top:20px">
      <div class="section-title">Conditions</div>
      <div class="form-grid g3">
        <div class="form-group"><label>Acompte (%)</label><input type="number" id="acompte" value="30" min="0" max="100" oninput="updatePreview()"></div>
        <div class="form-group"><label>Validité (jours)</label><input type="number" id="validite" value="30" min="1" oninput="updatePreview()"></div>
        <div class="form-group"><label>Délai travaux</label><input type="text" id="delai" placeholder="4–6 semaines" oninput="updatePreview()"></div>
      </div>
      <div class="form-grid g1" style="margin-top:8px">
        <div class="form-group"><label>Remarques</label><textarea id="notes" rows="2" placeholder="Informations complémentaires…" oninput="updatePreview()"></textarea></div>
      </div>
    </div>

    <div class="divider"></div>
    <button class="btn btn-primary" onclick="genererPDF()">📄 Générer & Télécharger le PDF</button>
    <div style="height:20px"></div>
  </div>

  <div class="panel-preview">
    <div class="section-title" style="margin-bottom:12px">Aperçu temps réel</div>
    <div id="preview-devis" class="preview-box"></div>
  </div>
</div>

      "Bois": { profils: { "Standard": { gammes: ["Standard"] } } }
    },
    ouvertures: ["Standard"],
    vitrages: ["Standard"],
  }
};

// ══════════════════════════════════════════════
// ÉTAT GLOBAL
// ══════════════════════════════════════════════
let produits = [];
let nextId = 1;

function getDevisNum() {
  const d = new Date();
  return `DEV-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*999)+1).padStart(3,'0')}`;
}
let devisNum = getDevisNum();

// ══════════════════════════════════════════════
// COMPTEURS PAR TYPE
// ══════════════════════════════════════════════
function getNumeroForType(type) {
  const cat = CATALOGUE[type];
  const prefix = cat ? cat.prefix : "N°";
  const existing = produits.filter(p => p.type === type);
  const num = existing.length + 1;
  return `${prefix}${String(num).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════
// AJOUTER PRODUIT
// ══════════════════════════════════════════════
function ajouterProduit(type) {
  const id = nextId++;
  const numero = getNumeroForType(type);
  const cat = CATALOGUE[type] || CATALOGUE['autre'];
  const produit = {
    id, type, numero,
    matiere: '', profil: '', gamme: '', ouverture: '', vitrage: '',
    largeur: '', hauteur: '',
    designation: '',
    quantite: 1, prixUnitaire: 0,
    withPose: false,
    prixPose: 0,
    open: true
  };
  produits.push(produit);
  renderProduits();
  updatePreview();
}

// ══════════════════════════════════════════════
// SUPPRIMER PRODUIT
// ══════════════════════════════════════════════
function supprimerProduit(id) {
  produits = produits.filter(p => p.id !== id);
  // Re-numéroter
  const counts = {};
  produits.forEach(p => {
    if (!counts[p.type]) counts[p.type] = 0;
    counts[p.type]++;
    const cat = CATALOGUE[p.type];
    const prefix = cat ? cat.prefix : "N°";
    p.numero = `${prefix}${String(counts[p.type]).padStart(2,'0')}`;
  });
  renderProduits();
  updatePreview();
}

// ══════════════════════════════════════════════
// TOGGLE CARD
// ══════════════════════════════════════════════
function toggleCard(id) {
  const p = produits.find(x => x.id === id);
  if (p) p.open = !p.open;
  renderProduits();
}

// ══════════════════════════════════════════════
// MISE À JOUR CONFIGURATEUR
// ══════════════════════════════════════════════
function onMatiereChange(id) {

  p.profil = '';
  p.gamme = '';
  p.ouverture = '';
  p.vitrage = '';
  updateDesignation(id);
  renderProfilSelect(id);
  renderGammeSelect(id);
  renderOuvertureSelect(id);
  renderVitrageSelect(id);
}

function onProfilChange(id) {
  const p = produits.find(x => x.id === id);
  p.profil = document.getElementById(`prof-${id}`).value;
  p.gamme = '';
  updateDesignation(id);
  renderGammeSelect(id);
}

function onGammeChange(id) {
  const p = produits.find(x => x.id === id);
  p.gamme = document.getElementById(`gam-${id}`).value;
  updateDesignation(id);
}

function onOuvertureChange(id) {
  const p = produits.find(x => x.id === id);
  p.ouverture = document.getElementById(`ouv-${id}`).value;
  updateDesignation(id);
  renderSVG(id);
}

function onVitrageChange(id) {
  const p = produits.find(x => x.id === id);
  p.vitrage = document.getElementById(`vit-${id}`).value;
  updateDesignation(id);
}

function renderProfilSelect(id) {

  const sel = document.getElementById(`prof-${id}`);
  if (!sel) return;
  sel.innerHTML = '<option value="">— Choisir un profilé —</option>';

    });
    sel.disabled = false;
  } else {
    sel.disabled = true;
  }
}

function renderGammeSelect(id) {
  const p = produits.find(x => x.id === id);
  const cat = CATALOGUE[p.type];
  const sel = document.getElementById(`gam-${id}`);
  if (!sel) return;
  sel.innerHTML = '<option value="">— Choisir une gamme —</option>';
  if (p.matiere && p.profil && cat.matieres[p.matiere] && cat.matieres[p.matiere].profils[p.profil]) {
    cat.matieres[p.matiere].profils[p.profil].gammes.forEach(g => {
      sel.innerHTML += `<option value="${g}">${g}</option>`;
    });
    sel.disabled = false;
  } else {
    sel.disabled = true;
  }
}

function renderOuvertureSelect(id) {
  const p = produits.find(x => x.id === id);
  const cat = CATALOGUE[p.type];
  const sel = document.getElementById(`ouv-${id}`);
  if (!sel) return;
  sel.innerHTML = '<option value="">— Type d\'ouverture —</option>';
  cat.ouvertures.forEach(o => {
    sel.innerHTML += `<option value="${o}">${o}</option>`;
  });
  if (p.matiere) sel.disabled = false;
  else sel.disabled = true;
}

function renderVitrageSelect(id) {
  const p = produits.find(x => x.id === id);
  const cat = CATALOGUE[p.type];
  const sel = document.getElementById(`vit-${id}`);
  if (!sel) return;
  sel.innerHTML = '<option value="">— Type de vitrage —</option>';
  if (p.type === 'volet') {
    sel.innerHTML = '<option value="N/A">N/A (volet roulant)</option>';
    sel.disabled = true;
    return;
  }
  cat.vitrages.forEach(v => {
    sel.innerHTML += `<option value="${v}">${v}</option>`;
  });
  if (p.matiere) sel.disabled = false;
  else sel.disabled = true;
}

// ══════════════════════════════════════════════
// GÉNÉRATION DÉSIGNATION AUTOMATIQUE
// ══════════════════════════════════════════════
function updateDesignation(id) {
  const p = produits.find(x => x.id === id);
  const cat = CATALOGUE[p.type];
  const parts = [];
  if (p.matiere) parts.push(p.matiere);
  if (p.profil) parts.push(p.profil);
  if (p.gamme) parts.push(`Gamme ${p.gamme}`);
  if (p.ouverture) parts.push(p.ouverture);
  if (p.largeur && p.hauteur) parts.push(`${p.largeur}x${p.hauteur}mm`);
  if (p.vitrage && p.vitrage !== 'N/A') parts.push(p.vitrage);

  if (parts.length > 0) {
    p.designation = `${cat.label} ${parts.join(' — ')}`;
  } else {
    p.designation = '';
  }

  const box = document.getElementById(`desig-${id}`);
  if (box) {
    if (p.designation) {
      box.textContent = p.designation;
      box.className = 'designation-box';
    } else {
      box.textContent = 'La désignation apparaîtra ici au fur et à mesure de votre sélection…';
      box.className = 'designation-box empty';
    }
  }
  updatePreview();
}

// ══════════════════════════════════════════════
// DIMENSIONS & PRIX
// ══════════════════════════════════════════════
function onDimChange(id) {
  const p = produits.find(x => x.id === id);
  const l = document.getElementById(`larg-${id}`);
  const h = document.getElementById(`haut-${id}`);
  if (l) p.largeur = l.value;
  if (h) p.hauteur = h.value;
  updateDesignation(id);
  renderSVG(id);
}

function onQtyChange(id) {
  const p = produits.find(x => x.id === id);
  const el = document.getElementById(`qty-${id}`);
  if (el) p.quantite = parseFloat(el.value) || 1;
  updateCardTotal(id);
  updatePreview();
}

function onPrixChange(id) {
  const p = produits.find(x => x.id === id);
  const el = document.getElementById(`prix-${id}`);
  if (el) p.prixUnitaire = parseFloat(el.value) || 0;
  updateCardTotal(id);
  updatePreview();
}

function onPoseToggle(id) {
  const p = produits.find(x => x.id === id);
  const cb = document.getElementById(`pose-cb-${id}`);
  if (cb) p.withPose = cb.checked;
  const poseRow = document.getElementById(`pose-row-${id}`);
  if (poseRow) poseRow.style.display = p.withPose ? 'grid' : 'none';
  updateCardTotal(id);
  updatePreview();
}

function onPrixPoseChange(id) {
  const p = produits.find(x => x.id === id);
  const el = document.getElementById(`prixpose-${id}`);
  if (el) p.prixPose = parseFloat(el.value) || 0;
  updateCardTotal(id);
  updatePreview();
}

function getPrixTotal(p) {
  const fournitures = (p.prixUnitaire || 0) * (p.quantite || 1);
  const pose = p.withPose ? (p.prixPose || 0) * (p.quantite || 1) : 0;
  return fournitures + pose;
}

function updateCardTotal(id) {
  const p = produits.find(x => x.id === id);
  const el = document.getElementById(`card-total-${id}`);
  if (el) el.textContent = fmtEur(getPrixTotal(p));
}

// ══════════════════════════════════════════════
// SVG DESSIN MENUISERIE
// ══════════════════════════════════════════════
function renderSVG(id) {
  const p = produits.find(x => x.id === id);
  const container = document.getElementById(`svg-container-${id}`);
  if (!container) return;
  container.innerHTML = genSVG(p, 120, 140);
}

function genSVG(p, W, H) {
  if (!p.largeur || !p.hauteur) return '<svg width="'+W+'" height="'+H+'"><rect x="5" y="5" width="'+(W-10)+'" height="'+(H-10)+'" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/><text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="#aaa" font-size="9">Entrez les dimensions</text></svg>';

  const type = p.type;
  const ouv = p.ouverture || '';
  const stroke = '#0d1b2a';
  const frameFill = '#e8e4dc';
  const glassFill = 'rgba(180,220,240,0.4)';
  const arrowColor = '#c8782a';

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Étiquette dimensions
  svg += `<text x="${W/2}" y="${H-3}" text-anchor="middle" fill="#888" font-size="7">${p.largeur}×${p.hauteur}mm</text>`;

  const x=8, y=8, w=W-16, h=H-20;

  if (type === 'volet') {
    // Volet roulant - lames horizontales
    svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${frameFill}" stroke="${stroke}" stroke-width="2"/>`;
    for (let i=0; i<8; i++) {
      const ly = y + (h/8)*i + h/16;
      svg += `<line x1="${x+4}" y1="${ly}" x2="${x+w-4}" y2="${ly}" stroke="${stroke}" stroke-width="1" opacity="0.4"/>`;
    }
    svg += `<rect x="${x}" y="${y}" width="${w}" height="10" fill="${stroke}" opacity="0.7"/>`;
  } else if (type === 'garage') {
    // Porte de garage - panneaux
    svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${frameFill}" stroke="${stroke}" stroke-width="2"/>`;
    const nPanneaux = 4;
    for (let i=0; i<nPanneaux; i++) {
      const py = y + (h/nPanneaux)*i + 2;
      svg += `<rect x="${x+4}" y="${py}" width="${w-8}" height="${h/nPanneaux-4}" fill="white" stroke="${stroke}" stroke-width="0.5" rx="2"/>`;
    }
  } else {
    // CADRE PRINCIPAL
    svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${frameFill}" stroke="${stroke}" stroke-width="3"/>`;

    const is2V = ouv.includes('2 vantaux') || ouv.includes('2 vantaux');
    const is3V = ouv.includes('3 vantaux');
    const isCoul = ouv.toLowerCase().includes('coulissant') || ouv.toLowerCase().includes('galandage');
    const isFixed = ouv === 'Fixe';

    if (is3V) {
      // 3 vantaux
      const vw = (w-6)/3;
      for (let i=0; i<3; i++) {
        const vx = x+3+i*(vw+1.5);
        svg += `<rect x="${vx}" y="${y+3}" width="${vw}" height="${h-6}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
        if (!isFixed && i!==1) {
          const cx = vx+vw/2;
          const cy = y+h/2;
          const dir = (i===0 && !isCoul) ? -1 : 1;
          svg += `<line x1="${cx}" y1="${cy-8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrowColor}" stroke-width="1.5"/>`;
          svg += `<line x1="${cx}" y1="${cy+8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrowColor}" stroke-width="1.5"/>`;
        }
      }
    } else if (is2V || ouv === 'Battant 2 vantaux' || ouv === 'Battant 2 vantaux + imposte') {
      const vw = (w-7)/2;
      const hasImposte = ouv.includes('imposte');
      const ih = hasImposte ? h*0.25 : 0;
      const vh = h - 6 - ih;
      if (hasImposte) {
        svg += `<rect x="${x+3}" y="${y+3}" width="${w-6}" height="${ih}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
      }
      for (let i=0; i<2; i++) {
        const vx = x+3+i*(vw+1);
        const vy = y+3+ih;
        svg += `<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
        if (!isCoul) {
          const cx = vx+vw/2;
          const cy = vy+vh/2;
          const dir = i===0 ? -1 : 1;
          svg += `<line x1="${cx}" y1="${cy-8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrowColor}" stroke-width="1.5"/>`;
          svg += `<line x1="${cx}" y1="${cy+8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrowColor}" stroke-width="1.5"/>`;
        }
      }
    } else {
      // 1 vantail
      const hasImposte = ouv && ouv.includes('imposte');
      const ih = hasImposte ? h*0.25 : 0;
      const vh = h - 6 - ih;
      if (hasImposte) {
        svg += `<rect x="${x+3}" y="${y+3}" width="${w-6}" height="${ih}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
      }
      svg += `<rect x="${x+3}" y="${y+3+ih}" width="${w-6}" height="${vh}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
      if (!isFixed && !isCoul) {
        const cx = x+3+(w-6)/2;
        const cy = y+3+ih+vh/2;
        svg += `<line x1="${cx}" y1="${cy-10}" x2="${cx+12}" y2="${cy}" stroke="${arrowColor}" stroke-width="1.5"/>`;
        svg += `<line x1="${cx}" y1="${cy+10}" x2="${cx+12}" y2="${cy}" stroke="${arrowColor}" stroke-width="1.5"/>`;
      }
      if (isCoul && !isFixed) {
        const cx = x+3+(w-6)/2;
        const cy = y+3+ih+vh/2;
        svg += `<line x1="${cx-12}" y1="${cy}" x2="${cx+12}" y2="${cy}" stroke="${arrowColor}" stroke-width="1.5" marker-end="url(#arr)"/>`;
      }
    }
  }

  svg += '</svg>';
  return svg;
}

            <div class="form-group" style="grid-column:span 2">
              <label>Prix fourniture HT (€)</label>
              <input type="number" id="prix-${p.id}" value="${p.prixUnitaire}" min="0" step="1" placeholder="0,00" oninput="onPrixChange(${p.id})" style="background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;">
            </div>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="pose-cb-${p.id}" ${p.withPose?'checked':''} onchange="onPoseToggle(${p.id})">
            <label for="pose-cb-${p.id}">Inclure la pose</label>
          </div>
          <div id="pose-row-${p.id}" class="form-grid g2" style="margin-top:8px;display:${p.withPose?'grid':'none'}">
            <div class="form-group">
              <label>Prix pose HT (€)</label>
              <input type="number" id="prixpose-${p.id}" value="${p.prixPose}" min="0" step="1" placeholder="0,00" oninput="onPrixPoseChange(${p.id})" style="background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;">
            </div>
          </div>
          <div style="margin-top:10px;padding:8px 12px;background:rgba(200,120,42,0.08);border:1px solid var(--border);border-radius:6px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:11px;color:var(--text-muted)">Total ligne HT</span>
            <span style="font-size:15px;color:var(--gold);font-weight:700" id="card-total2-${p.id}">${fmtEur(total)}</span>
          </div>
        </div>
      </div>
    </div>`;
    container.insertAdjacentHTML('beforeend', html);
  });
}

// ══════════════════════════════════════════════
// SWITCH TABS
// ══════════════════════════════════════════════
function switchTab(id, tab, el) {
  const tabs = ['config','dessin','prix'];
  tabs.forEach(t => {
    const el2 = document.getElementById(`tab-${t}-${id}`);
    if (el2) el2.style.display = t === tab ? 'block' : 'none';
  });
  // Update tab buttons
  const tabBtns = el.parentElement.querySelectorAll('.tab');
  tabBtns.forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  // Refresh SVG when switching to dessin
  if (tab === 'dessin') renderSVG(id);
}

// ══════════════════════════════════════════════
// FORMAT EUROS
// ══════════════════════════════════════════════
function fmtEur(n) {
  return (n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}

// ══════════════════════════════════════════════
// UPDATE TOTAUX
// ══════════════════════════════════════════════
function getTotaux() {
  const tva = parseFloat(document.getElementById('tva-select')?.value || 10);
  const ht = produits.reduce((s,p) => s + getPrixTotal(p), 0);
  const tvaAmt = ht * tva / 100;
  const ttc = ht + tvaAmt;
  return {ht, tva, tvaAmt, ttc};
}

// ══════════════════════════════════════════════
// UPDATE PREVIEW
// ══════════════════════════════════════════════
function updatePreview() {
  const nom = document.getElementById('clientNom')?.value || '';
  const tel = document.getElementById('clientTel')?.value || '';
  const email = document.getElementById('clientEmail')?.value || '';
  const adresse = document.getElementById('clientAdresse')?.value || '';
  const dateVal = document.getElementById('devisDate')?.value || '';
  const acompte = document.getElementById('acompte')?.value || '30';
  const validite = document.getElementById('validite')?.value || '30';
  const delai = document.getElementById('delai')?.value || '';
  const notes = document.getElementById('notes')?.value || '';

  const {ht, tva, tvaAmt, ttc} = getTotaux();

  // Update totaux in form
  document.getElementById('tot-ht').textContent = fmtEur(ht);
  document.getElementById('tot-tva').textContent = fmtEur(tvaAmt);
  document.getElementById('tot-ttc').textContent = fmtEur(ttc);

  // Update card totals
  produits.forEach(p => {
    const el = document.getElementById(`card-total-${p.id}`);

    if (el2) el2.textContent = fmtEur(getPrixTotal(p));
  });

  const dateStr = dateVal ? new Date(dateVal).toLocaleDateString('fr-FR') : new Date().toLocaleDateString('fr-FR');
  const acompteAmt = ttc * parseFloat(acompte) / 100;

  // Lignes produits preview
  let lignes = '';

    if (!p.designation && !p.prixUnitaire) return;

      <td>${desig}</td>
      <td class="r">${p.quantite}</td>
      <td class="r">${fmtEur(p.prixUnitaire)}</td>
      ${p.withPose ? `<td class="r">${fmtEur(p.prixPose)}</td>` : '<td class="r">—</td>'}
      <td class="r b">${fmtEur(totalLigne)}</td>
    </tr>`;
  });

  const logoSrc = LOGO_B64 ? `data:image/png;base64,${LOGO_B64}` : '';
  const logoHtml = logoSrc ? `<img src="${logoSrc}" style="height:36px">` : '<div style="font-size:14px;color:#c8a060;font-weight:700;letter-spacing:2px">FENYX</div>';

  const preview = document.getElementById('preview-devis');
  preview.innerHTML = `
  <div class="prev-header">
    ${logoHtml}
    <div class="prev-header-r">
      <div class="prev-co-name">FENYX OUVERTURES</div>
      <div class="prev-co-sub">MENUISERIES — FENÊTRES — FERMETURES</div>
      <div class="prev-co-contact">contact@fenyx.fr · 06 XX XX XX XX</div>
    </div>
  </div>
  <div class="prev-body">
    <div class="prev-devis-title">
      Devis
      <span class="prev-num">${devisNum} · ${dateStr}</span>
    </div>
    <div class="prev-client">
      <div class="lbl">Client</div>
      <div class="val">${nom || '—'}</div>
      ${tel ? `<div style="font-size:9px;color:#666;margin-top:2px">${tel}${email ? ' · '+email : ''}</div>` : ''}
      ${adresse ? `<div style="font-size:9px;color:#888;margin-top:1px">Chantier : ${adresse}</div>` : ''}
    </div>
    <table class="prev-table">
      <thead>
        <tr>
          <th>Réf.</th>
          <th>Désignation</th>
          <th>Qté</th>
          <th>P.U. HT</th>
          <th>Pose HT</th>
          <th>Total HT</th>
        </tr>
      </thead>
      <tbody>
        ${lignes || '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:12px;font-size:10px">Ajoutez des produits pour les voir ici</td></tr>'}
      </tbody>
    </table>
    <div class="prev-totaux">
      <div class="prev-tot-box">
        <div class="prev-tot-row"><span>Sous-total HT</span><span>${fmtEur(ht)}</span></div>
        <div class="prev-tot-row"><span>TVA ${tva}%</span><span>${fmtEur(tvaAmt)}</span></div>
        <div class="prev-tot-row ttc"><span>TOTAL TTC</span><span>${fmtEur(ttc)}</span></div>
      </div>
    </div>
    <div class="prev-cond">
      ${acompte ? `<b>Acompte :</b> ${acompte}% à la commande, soit ${fmtEur(acompteAmt)}<br>` : ''}
      ${validite ? `<b>Validité :</b> ${validite} jours à compter du ${dateStr}<br>` : ''}
      ${delai ? `<b>Délai :</b> ${delai}<br>` : ''}
      ${notes ? `<b>Remarques :</b> ${notes}` : ''}
    </div>
    <div class="prev-sigs">
      <div class="prev-sig">BON POUR ACCORD<br><br>Signature client :</div>
      <div class="prev-sig">CACHET & SIGNATURE<br><br>Fenyx Ouvertures :</div>
    </div>
  </div>
  <div class="prev-footer">FENYX OUVERTURES · SIRET XXXXXXXXX · TVA INTRA FR XX XXX XXX XXX</div>`;
}

// ══════════════════════════════════════════════
// GÉNÉRATION PDF
// ══════════════════════════════════════════════
function genererPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, H = 297;
  const margin = 14;

  // Couleurs
  const navy = [13,27,42];
  const copper = [200,120,42];
  const gold = [212,168,67];
  const lightBg = [248,244,239];
  const white = [255,255,255];
  const darkText = [26,26,26];
  const grayText = [102,102,102];

  // Header
  doc.setFillColor(...navy);
  doc.rect(0, 0, W, 28, 'F');
  doc.setFontSize(14);
  doc.setTextColor(...[200,160,96]);
  doc.setFont('helvetica','bold');
  doc.text('FENYX OUVERTURES', margin, 11);
  doc.setFontSize(6.5);
  doc.setFont('helvetica','normal');
  doc.setTextColor(...[138,154,176]);
  doc.text('MENUISERIES — FENÊTRES — FERMETURES', margin, 16);
  doc.setTextColor(...[192,200,212]);
  doc.text('contact@fenyx.fr  ·  06 XX XX XX XX', margin, 21);

  // Numéro & date
  const dateVal = document.getElementById('devisDate')?.value || '';
  const dateStr = dateVal ? new Date(dateVal).toLocaleDateString('fr-FR') : new Date().toLocaleDateString('fr-FR');
  doc.setFontSize(7.5);
  doc.setTextColor(...white);
  doc.text(`${devisNum}  ·  ${dateStr}`, W - margin, 11, {align:'right'});

  let y = 36;

  // Titre DEVIS
  doc.setFontSize(18);
  doc.setFont('helvetica','bold');
  doc.setTextColor(...navy);
  doc.text('DEVIS', margin, y);
  doc.setDrawColor(...copper);
  doc.setLineWidth(0.7);
  doc.line(margin, y+2, W-margin, y+2);
  y += 10;

  // Bloc client
  const nom = document.getElementById('clientNom')?.value || '—';
  const tel = document.getElementById('clientTel')?.value || '';
  const email = document.getElementById('clientEmail')?.value || '';
  const adresse = document.getElementById('clientAdresse')?.value || '';
  doc.setFillColor(...lightBg);
  doc.setDrawColor(...copper);
  doc.setLineWidth(0.5);
  doc.rect(margin, y, W - margin*2, 18, 'FD');
  doc.setLineWidth(1.5);
  doc.line(margin, y, margin, y+18);
  doc.setFontSize(6.5);
  doc.setTextColor(...grayText);
  doc.setFont('helvetica','normal');
  doc.text('CLIENT', margin+4, y+5);
  doc.setFontSize(10);
  doc.setFont('helvetica','bold');
  doc.setTextColor(...darkText);
  doc.text(nom, margin+4, y+10);
  doc.setFontSize(7.5);
  doc.setFont('helvetica','normal');
  doc.setTextColor(...grayText);
  if (tel || email) doc.text(`${tel}${tel && email ? '  ·  ' : ''}${email}`, margin+4, y+14.5);
  if (adresse) doc.text(`Chantier : ${adresse}`, W-margin-4, y+14.5, {align:'right'});
  y += 24;

  // Tableau produits
  const headers = ['Réf.', 'Désignation', 'Qté', 'P.U. HT', 'Pose HT', 'Total HT'];
  const colW = [14, 82, 10, 22, 22, 26];
  let cx = margin;

  // En-tête tableau
  doc.setFillColor(...navy);
  doc.rect(margin, y, W - margin*2, 7, 'F');
  doc.setFontSize(6.5);
  doc.setFont('helvetica','bold');
  doc.setTextColor(...[200,160,96]);
  headers.forEach((h, i) => {
    doc.text(h, cx + (i >= 2 ? colW[i]-1 : 2), y+5, {align: i >= 2 ? 'right' : 'left'});
    cx += colW[i];
  });
  y += 7;

  // Lignes
  doc.setFont('helvetica','normal');
  let rowEven = false;
  const {ht, tva, tvaAmt, ttc} = getTotaux();

  produits.forEach(p => {
    const cat = CATALOGUE[p.type] || CATALOGUE['autre'];
    const desig = p.designation || `${cat.label}`;
    const totalLigne = getPrixTotal(p);
    const rowH = 7;

    if (rowEven) {
      doc.setFillColor(250, 248, 245);
      doc.rect(margin, y, W - margin*2, rowH, 'F');
    }

    cx = margin;
    doc.setFontSize(7);
    doc.setTextColor(...darkText);

    // Réf
    doc.setFont('helvetica','bold');
    doc.setTextColor(...[150,100,40]);
    doc.text(p.numero, cx+2, y+5);
    cx += colW[0];

    // Désignation (peut être long)
    doc.setFont('helvetica','normal');
    doc.setTextColor(...darkText);
    const desigTrunc = desig.length > 60 ? desig.substring(0,58)+'…' : desig;
    doc.text(desigTrunc, cx+2, y+5);
    cx += colW[1];

    // Qté, PU, Pose, Total
    [p.quantite, fmtEur(p.prixUnitaire), p.withPose ? fmtEur(p.prixPose) : '—', fmtEur(totalLigne)].forEach((v, i) => {
      if (i === 3) { doc.setFont('helvetica','bold'); doc.setTextColor(...darkText); }
      doc.text(String(v), cx + colW[2+i] - 1, y+5, {align:'right'});
      doc.setFont('helvetica','normal');
      cx += colW[2+i];
    });

    doc.setDrawColor(238,238,238);
    doc.setLineWidth(0.2);
    doc.line(margin, y+rowH, W-margin, y+rowH);
    y += rowH;
    rowEven = !rowEven;
  });

  y += 4;

  // Totaux
  const totW = 60;
  const totX = W - margin - totW;
  doc.setFontSize(8);

  [[`Sous-total HT`, fmtEur(ht)],[`TVA ${tva}%`, fmtEur(tvaAmt)]].forEach(([l,v]) => {
    doc.setFont('helvetica','normal');
    doc.setTextColor(...grayText);
    doc.text(l, totX, y+4);
    doc.text(v, W-margin, y+4, {align:'right'});
    doc.setDrawColor(238,238,238);
    doc.line(totX, y+6, W-margin, y+6);
    y += 7;
  });

  // TOTAL TTC
  doc.setFillColor(...lightBg);
  doc.rect(totX-2, y, W-margin-totX+2, 9, 'F');
  doc.setDrawColor(...copper);
  doc.setLineWidth(0.7);
  doc.line(totX-2, y, W-margin, y);
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(...navy);
  doc.text('TOTAL TTC', totX, y+7);
  doc.setTextColor(...[180,130,40]);
  doc.text(fmtEur(ttc), W-margin, y+7, {align:'right'});
  y += 15;

  // Conditions
  const acompte = document.getElementById('acompte')?.value || '30';
  const validite = document.getElementById('validite')?.value || '30';
  const delai = document.getElementById('delai')?.value || '';
  const notes = document.getElementById('notes')?.value || '';
  const acompteAmt = ttc * parseFloat(acompte) / 100;

  doc.setFillColor(...lightBg);
  doc.rect(margin, y, W-margin*2, 28, 'F');
  doc.setFontSize(7);
  doc.setFont('helvetica','normal');
  doc.setTextColor(...grayText);
  let condY = y + 5;
  if (acompte) { doc.setFont('helvetica','bold'); doc.text('Acompte : ', margin+3, condY); doc.setFont('helvetica','normal'); doc.text(`${acompte}% à la commande, soit ${fmtEur(acompteAmt)}`, margin+22, condY); condY += 5; }
  if (validite) { doc.setFont('helvetica','bold'); doc.text('Validité : ', margin+3, condY); doc.setFont('helvetica','normal'); doc.text(`${validite} jours à compter du ${dateStr}`, margin+22, condY); condY += 5; }
  if (delai) { doc.setFont('helvetica','bold'); doc.text('Délai : ', margin+3, condY); doc.setFont('helvetica','normal'); doc.text(delai, margin+22, condY); condY += 5; }
  if (notes) { doc.setFont('helvetica','bold'); doc.text('Remarques : ', margin+3, condY); doc.setFont('helvetica','normal'); doc.text(notes.substring(0,100), margin+28, condY); }
  y += 33;

  // Signatures
  const sigW = (W - margin*2 - 8) / 2;
  ['BON POUR ACCORD\nSignature client :', 'CACHET & SIGNATURE\nFenyx Ouvertures :'].forEach((lbl, i) => {
    const sx = margin + i*(sigW+8);
    doc.setDrawColor(220,220,220);
    doc.setLineWidth(0.3);
    doc.rect(sx, y, sigW, 22, 'D');
    doc.setFontSize(6.5);
    doc.setTextColor(...grayText);
    lbl.split('\n').forEach((line, j) => doc.text(line, sx+3, y+5+j*5));
  });

  // Footer
  doc.setFillColor(...navy);
  doc.rect(0, H-12, W, 12, 'F');
  doc.setFontSize(6.5);
  doc.setTextColor(...[138,154,176]);
  doc.text('FENYX OUVERTURES  ·  SIRET XXXXXXXXX  ·  TVA INTRA FR XX XXX XXX XXX', W/2, H-5, {align:'center'});

  doc.save(`Devis_Fenyx_${nom.replace(/\s+/g,'_')}_${devisNum}.pdf`);
}

// ══════════════════════════════════════════════
// RÉINITIALISER
// ══════════════════════════════════════════════
function reinitialiser() {
  if (!confirm('Réinitialiser le devis ? Toutes les données seront perdues.')) return;
  produits = [];
  nextId = 1;
  devisNum = getDevisNum();
  ['clientNom','clientTel','clientEmail','clientAdresse','devisDate','notes','delai'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('acompte').value = '30';
  document.getElementById('validite').value = '30';
  renderProduits();
  updatePreview();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('devisDate').value = new Date().toISOString().split('T')[0];
  updatePreview();
});
</script>
