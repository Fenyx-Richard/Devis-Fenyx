<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenyx Ouvertures — Devis Pro v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --navy:#0d1b2a; --navy2:#162235; --navy3:#1e2f45; --navy4:#253650;
  --copper:#c8782a; --copper-light:#e8a050; --gold:#d4a843;
  --text:#e8ddd0; --text-muted:#8a9ab0;
  --border:rgba(200,120,42,0.2); --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--text);min-height:100vh;font-size:13px;}
.app-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 4px 30px rgba(0,0,0,0.4);}
.app-header img{height:42px;filter:drop-shadow(0 0 10px rgba(200,120,42,0.5));}
.app-header-text h1{font-size:16px;font-weight:600;letter-spacing:3px;color:var(--copper-light);text-transform:uppercase;}
.app-header-text p{font-size:9px;color:var(--text-muted);letter-spacing:2px;}
.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;}
.app-body{display:flex;min-height:calc(100vh - 63px);}
.panel-form{width:58%;padding:20px;border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 63px);}
.panel-preview{width:42%;padding:20px;background:var(--navy2);overflow-y:auto;max-height:calc(100vh - 63px);}
.section{margin-bottom:20px;}
.section-title{font-size:10px;letter-spacing:3px;color:var(--copper);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-weight:600;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.form-grid{display:grid;gap:8px;}
.g1{grid-template-columns:1fr;} .g2{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group label{font-size:10px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;}
.form-group input,.form-group select,.form-group textarea{background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--copper);box-shadow:0 0 0 2px rgba(200,120,42,0.1);}
.form-group textarea{resize:vertical;min-height:45px;}
select option{background:var(--navy3);}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.checkbox-row label{font-size:12px;color:var(--text);cursor:pointer;letter-spacing:0;text-transform:none;}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--copper);cursor:pointer;}
.tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--navy3);padding:3px;border-radius:7px;}
.tab{flex:1;padding:6px;text-align:center;border-radius:5px;cursor:pointer;font-size:10px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;color:var(--text-muted);}
.tab.active{background:var(--copper);color:white;font-weight:600;}
.product-card{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.product-card-header{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:rgba(0,0,0,0.15);border-bottom:1px solid var(--border);}
.product-card-header:hover{background:rgba(200,120,42,0.08);}
.card-num{background:var(--copper);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.card-title{flex:1;font-size:12px;font-weight:500;color:var(--copper-light);}
.card-subtitle{font-size:9px;color:var(--text-muted);margin-top:2px;}
.card-total{font-size:13px;color:var(--gold);font-weight:600;}
.card-toggle{color:var(--text-muted);font-size:11px;transition:transform 0.2s;}
.card-toggle.open{transform:rotate(180deg);}
.btn-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:15px;padding:2px 5px;border-radius:4px;transition:all 0.2s;}
.btn-del:hover{color:#e05555;background:rgba(224,85,85,0.1);}
.product-card-body{padding:12px;display:none;}
.product-card-body.open{display:block;}
/* CASCADE */
.config-cascade{background:rgba(0,0,0,0.15);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.config-step{margin-bottom:8px;}
.config-step:last-child{margin-bottom:0;}
.config-step label{display:block;font-size:9px;letter-spacing:1.5px;color:var(--copper);text-transform:uppercase;margin-bottom:4px;}
.config-step select,.config-step input[type=text]{width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;transition:border-color 0.2s;}
.config-step select:focus,.config-step input[type=text]:focus{border-color:var(--copper);}
.config-step select:disabled{opacity:0.38;cursor:not-allowed;}
.config-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.config-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.designation-box{background:var(--navy4);border:1px solid var(--copper);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--copper-light);font-style:italic;margin:8px 0;min-height:36px;line-height:1.6;}
.designation-box.empty{color:var(--text-muted);font-style:normal;border-color:var(--border);}
/* separator inside cascade */
.cascade-sep{height:1px;background:var(--border);margin:8px 0;}
/* "Autre" badge label */
.autre-badge{display:inline-block;background:rgba(200,120,42,0.15);border:1px solid rgba(200,120,42,0.35);color:var(--copper-light);border-radius:4px;padding:1px 7px;font-size:9px;letter-spacing:1px;margin-left:6px;vertical-align:middle;}
/* SVG */
.drawing-container{background:white;border-radius:6px;padding:8px;margin:8px 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
/* PHOTOS */
.photo-zone{border:2px dashed var(--border);border-radius:8px;overflow:hidden;position:relative;cursor:pointer;transition:border-color 0.2s;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.1);}
.photo-zone:hover{border-color:var(--copper);}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text-muted);font-size:11px;pointer-events:none;}
.photo-placeholder .icon{font-size:28px;}
.photo-zone img{width:100%;height:100%;object-fit:cover;display:none;}
.photo-remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;z-index:2;}
.photo-zone:hover .photo-remove{display:flex;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.2s;font-weight:500;}
.btn-primary{background:linear-gradient(135deg,var(--copper),var(--copper-light));color:white;width:100%;justify-content:center;font-size:12px;padding:12px;box-shadow:0 4px 20px rgba(200,120,42,0.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(200,120,42,0.45);}
.btn-add{background:rgba(200,120,42,0.1);border:1px dashed var(--copper);color:var(--copper-light);width:100%;justify-content:center;margin-top:4px;}
.btn-add:hover{background:rgba(200,120,42,0.2);}
.btn-ghost{background:var(--navy3);border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--copper);color:var(--copper-light);}
.btn-sm{padding:5px 10px;font-size:10px;}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.tag{background:rgba(200,120,42,0.1);border:1px solid rgba(200,120,42,0.3);color:var(--copper-light);border-radius:20px;padding:3px 10px;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.tag:hover{background:rgba(200,120,42,0.25);}
.totaux-box{background:var(--navy3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:14px;}
.totaux-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;color:var(--text-muted);border-bottom:1px solid rgba(255,255,255,0.04);}
.totaux-row.ttc{font-size:17px;color:var(--gold);font-weight:700;border-bottom:none;margin-top:5px;}
/* PREVIEW */
.preview-box{background:white;border-radius:8px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.5);color:#1a1a1a;font-size:11px;}
.prev-header{background:#0d1b2a;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.prev-header-r{text-align:right;color:white;}
.prev-co-name{font-size:13px;letter-spacing:3px;color:#c8a060;font-weight:600;}
.prev-co-sub{font-size:7px;color:#8a9ab0;letter-spacing:1px;}
.prev-co-contact{font-size:7px;color:#c0c8d4;margin-top:2px;}
.prev-body{padding:16px 18px;}
.prev-devis-title{font-size:15px;color:#0d1b2a;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid #c8782a;padding-bottom:5px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-end;}
.prev-num{font-size:9px;color:#c8782a;font-weight:400;}
.prev-client{background:#f8f4ef;border-left:3px solid #c8782a;padding:8px 12px;margin-bottom:12px;border-radius:0 6px 6px 0;}
.prev-client .lbl{font-size:7px;letter-spacing:1.5px;color:#888;text-transform:uppercase;}
.prev-client .val{font-size:10px;color:#1a1a1a;font-weight:500;}
.prev-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:10px;}
.prev-table th{background:#0d1b2a;color:#c8a060;padding:5px 7px;text-align:left;font-size:7px;letter-spacing:1px;text-transform:uppercase;}
.prev-table td{padding:5px 7px;border-bottom:1px solid #eee;vertical-align:top;}
.prev-table tr:nth-child(even) td{background:#faf8f5;}
.prev-table td.r{text-align:right;} .prev-table td.b{font-weight:700;}
.prev-totaux{display:flex;justify-content:flex-end;margin-bottom:10px;}
.prev-tot-box{width:180px;}
.prev-tot-row{display:flex;justify-content:space-between;padding:3px 0;font-size:9px;color:#555;border-bottom:1px solid #eee;}
.prev-tot-row.ttc{font-size:12px;color:#0d1b2a;font-weight:700;border-bottom:none;border-top:2px solid #c8782a;padding-top:5px;margin-top:3px;}
.prev-cond{background:#f8f4ef;border-radius:6px;padding:9px 12px;font-size:8px;color:#666;line-height:1.6;margin-bottom:8px;}
.prev-sigs{display:flex;gap:10px;margin-bottom:8px;}
.prev-sig{flex:1;border:1px solid #ddd;border-radius:4px;padding:6px;min-height:44px;font-size:7px;color:#aaa;letter-spacing:1px;}
.prev-footer{background:#0d1b2a;color:#8a9ab0;padding:7px 18px;text-align:center;font-size:7px;letter-spacing:1px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
</style>
</head>
<body>

<header class="app-header">
  <svg id="headerLogo" viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg" style="height:42px;flex-shrink:0">
    <rect x="0" y="0" width="120" height="44" rx="4" fill="none"/>
    <!-- F stylisé -->
    <rect x="2" y="4" width="5" height="36" fill="#c8782a"/>
    <rect x="2" y="4" width="22" height="5" fill="#c8782a"/>
    <rect x="2" y="19" width="16" height="4" fill="#c8782a"/>
    <!-- FENYX texte -->
    <text x="30" y="28" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="#e8a050">FENYX</text>
    <!-- sous-ligne -->
    <rect x="30" y="33" width="88" height="1.5" fill="#c8782a" opacity="0.5"/>
    <text x="30" y="41" font-family="'Segoe UI',sans-serif" font-size="6.5" letter-spacing="2" fill="#8a9ab0">OUVERTURES</text>
  </svg>
  <div class="app-header-text">
    <h1>Fenyx Ouvertures</h1>
    <p>Générateur de devis pro</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="reinitialiser()">🔄 Nouveau</button>
    <button class="btn btn-primary btn-sm" onclick="genererPDF()">📄 PDF</button>
  </div>
</header>

<div class="app-body">
  <div class="panel-form">

    <div class="section">
      <div class="section-title">Informations client</div>
      <div class="form-grid g2">
        <div class="form-group"><label>Nom / Prénom</label><input type="text" id="clientNom" placeholder="Martin Dupont" oninput="updatePreview()"></div>
        <div class="form-group"><label>Téléphone</label><input type="text" id="clientTel" placeholder="06 XX XX XX XX" oninput="updatePreview()"></div>
        <div class="form-group"><label>Email</label><input type="email" id="clientEmail" placeholder="email@exemple.fr" oninput="updatePreview()"></div>
        <div class="form-group"><label>Date du devis</label><input type="date" id="devisDate" oninput="updatePreview()"></div>
        <div class="form-group" style="grid-column:span 2">
          <label style="display:flex;justify-content:space-between;align-items:center">
            Numéro de devis
            <span onclick="resetDevisCounter()" style="font-size:10px;color:var(--text-muted);cursor:pointer;text-decoration:underline;font-weight:400">Remettre à zéro</span>
          </label>
          <input type="text" id="devisNumInput" value="" oninput="onDevisNumChange()" style="font-family:monospace">
        </div>
      </div>
      <div class="form-grid g1" style="margin-top:8px">
        <div class="form-group"><label>Adresse du chantier</label><input type="text" id="clientAdresse" placeholder="Numéro, rue, code postal, ville" oninput="updatePreview()"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Produits & Prestations</div>
      <div class="tag-row">
        <span class="tag" onclick="ajouterProduit('fenetre')">+ Fenêtre</span>
        <span class="tag" onclick="ajouterProduit('porte-fenetre')">+ Porte-fenêtre</span>
        <span class="tag" onclick="ajouterProduit('porte-entree')">+ Porte d'entrée</span>
        <span class="tag" onclick="ajouterProduit('baie-psk')">+ Baie PSK</span>
        <span class="tag" onclick="ajouterProduit('baie-coul')">+ Baie coulissante</span>
        <span class="tag" onclick="ajouterProduit('garage')">+ Porte de garage</span>
        <span class="tag" onclick="ajouterProduit('volet')">+ Volet roulant</span>
        <span class="tag" onclick="ajouterProduit('autre')">+ Autre</span>
      </div>
      <div id="produits-container"></div>
    </div>

    <div class="totaux-box">
      <div class="totaux-row"><span>Sous-total HT</span><span id="tot-ht">0,00 €</span></div>
      <div class="totaux-row"><span>TVA <span id="tva-label">10</span>%</span><span id="tot-tva">0,00 €</span></div>
      <div class="totaux-row" style="padding-top:5px">
        <span style="font-size:10px;color:var(--text-muted)">Taux TVA</span>
        <select id="tva-select" onchange="updatePreview()" style="background:var(--navy);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:5px;font-size:11px;">
          <option value="10">10% — Rénovation</option>
          <option value="20">20% — Standard</option>
          <option value="5.5">5,5% — Travaux</option>
        </select>
      </div>
      <div class="totaux-row ttc"><span>TOTAL TTC</span><span id="tot-ttc">0,00 €</span></div>
    </div>

    <div class="section" style="margin-top:20px">
      <div class="section-title">Conditions</div>
      <div class="form-grid g3">
        <div class="form-group"><label>Acompte (%)</label><input type="number" id="acompte" value="30" min="0" max="100" oninput="updatePreview()"></div>
        <div class="form-group"><label>Validité (jours)</label><input type="number" id="validite" value="30" min="1" oninput="updatePreview()"></div>
        <div class="form-group"><label>Délai travaux</label><input type="text" id="delai" placeholder="4–6 semaines" oninput="updatePreview()"></div>
      </div>
      <div class="form-grid g1" style="margin-top:8px">
        <div class="form-group"><label>Remarques</label><textarea id="notes" rows="2" placeholder="Informations complémentaires…" oninput="updatePreview()"></textarea></div>
      </div>
    </div>

    <div style="height:20px"></div>
  </div>

  <div class="panel-preview">
    <div class="section-title" style="margin-bottom:12px">Aperçu temps réel</div>
    <div id="preview-devis" class="preview-box"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CATALOGUE
// Structure : matiere → fabricant → gamme (pour PVC)
//             matiere → gamme (pour Alu, etc.)
// Pour PVC on a un niveau de plus : Fabricant → Gamme/profilé
// ══════════════════════════════════════════════

// Vitrages communs
const VIT_STD   = ["Double vitrage 4/16/4 Argon", "Triple vitrage 4/16/4/16/4 Argon", "Feuilleté 44.2 sécurité", "Feuilleté 44.2 + DV Argon", "Contrôle solaire"];
const VIT_PORTE = ["Plein (sans vitrage)", "Vitré haut", "Vitré latéral droit", "Vitré latéral gauche", "Vitré total", "Ornemental"];
const VIT_BAIE  = ["Double vitrage 4/16/4 Argon", "Triple vitrage 4/16/4/16/4 Argon", "Feuilleté 44.2 sécurité", "Contrôle solaire"];

// Gammes Aluplast fenêtre/PF/PE
const ALUPLAST_FENPF = [
  { gamme: "IDEAL 4000", epaisseur: "70mm" },
  { gamme: "IDEAL 5000", epaisseur: "70mm" },
  { gamme: "IDEAL 7000", epaisseur: "85mm" },
  { gamme: "IDEAL 8000", epaisseur: "85mm" },
  { gamme: "NEO MD",     epaisseur: "76mm" },
];
// Gammes Aluplast baie PSK
const ALUPLAST_PSK = [
  { gamme: "Smart Slide",     epaisseur: "" },
  { gamme: "Smart Slide NEO", epaisseur: "" },
  { gamme: "Multi Slide",     epaisseur: "" },
  { gamme: "HST",             epaisseur: "" },
];

// PVC fabricants génériques (pour Veka et Kömmerling : à compléter)
function pvcFabricants(gammes) {
  return {
    "Aluplast": { type: "catalogue", gammes },
    "Veka":     { type: "placeholder" },
    "Kömmerling":{ type: "placeholder" },
    "Autre":    { type: "libre" },
  };
}

const CATALOGUE = {

  fenetre: {
    label: "Fenêtre",
    prefix: "Fen.",
    matieres: {
      "PVC": {
        hasFabricant: true,
        fabricants: pvcFabricants(ALUPLAST_FENPF),
      },
      "Aluminium": {
        hasFabricant: false,
        gammes: ["À compléter"],
      },
      "Mixte Bois-Alu": {
        hasFabricant: false,
        gammes: ["À compléter"],
      },
    },
    ouvertures: null, // géré par configurateur vantaux dédié
    vitrages: VIT_STD,
  },

  "porte-fenetre": {
    label: "Porte-fenêtre",
    prefix: "PF.",
    matieres: {
      "PVC": {
        hasFabricant: true,
        fabricants: pvcFabricants(ALUPLAST_FENPF),
      },
      "Aluminium": {
        hasFabricant: false,
        gammes: ["À compléter"],
      },
      "Mixte Bois-Alu": {
        hasFabricant: false,
        gammes: ["À compléter"],
      },
    },
    ouvertures: ["Battant 1 vantail", "Battant 2 vantaux", "Battant 2 vantaux + imposte", "Oscillo-battant 1 vantail", "Oscillo-battant 2 vantaux"],
    vitrages: VIT_STD,
  },

  "porte-entree": {
    label: "Porte d'entrée",
    prefix: "PE.",
    matieres: {
      "PVC": {
        hasFabricant: true,
        fabricants: pvcFabricants(ALUPLAST_FENPF),
      },
      "Aluminium": {
        hasFabricant: false,
        gammes: ["À compléter"],
      },
      "Acier": {
        hasFabricant: false,
        gammes: ["Standard", "Blindée", "Anti-effraction"],
      },
    },
    ouvertures: null, // géré par configurateur dédié
    vitrages: VIT_PORTE,
  },

  // ── BAIE PSK (oscillo-coulissant / levant-coulissant) ────────────────
  "baie-psk": {
    label: "Baie PSK",
    prefix: "PSK.",
    matieres: {
      "PVC": {
        hasFabricant: true,
        fabricants: pvcFabricants(ALUPLAST_FENPF),
      },
      "Aluminium": {
        hasFabricant: false,
        gammes: ["À compléter"],
      },
    },
    ouvertures: ["1 ouvrant actif", "2 ouvrants actifs"],
    vitrages: VIT_BAIE,
  },

  // ── BAIE COULISSANTE CLASSIQUE (Smart Slide, HST…) ───────────────────

function getDevisNum() {
  const d = new Date();
  const date = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const num = parseInt(localStorage.getItem('fenyx_devis_counter') || '0') + 1;
  localStorage.setItem('fenyx_devis_counter', String(num));
  return `DEV-${date}-${String(num).padStart(3,'0')}`;
}
function resetDevisCounter() {
  if(!confirm('Remettre le compteur à zéro ? Le prochain devis sera DEV-...-001.')) return;
  localStorage.setItem('fenyx_devis_counter', '0');
  devisNum = getDevisNum();
  const el = document.getElementById('devisNumInput');
  if(el) el.value = devisNum;
  updatePreview();
}
function onDevisNumChange() {
  devisNum = document.getElementById('devisNumInput')?.value || devisNum;
  updatePreview();
}
let devisNum = getDevisNum();

function getNumeroForType(type) {
  const cat = CATALOGUE[type];
  const prefix = cat ? cat.prefix : "N°";
  const n = produits.filter(p => p.type === type).length + 1;
  return `${prefix}${String(n).padStart(2,'0')}`;
}

function fmtEur(n) {
  const formatted = (n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, '\u202f');
  return formatted + ' €';
}

    const cat = CATALOGUE[p.type];
    p.numero = `${cat?cat.prefix:'N°'}${String(counts[p.type]).padStart(2,'0')}`;

  renderProduits();
  updatePreview();
}

}

function renderFenVantaux(id) {
  const p = produits.find(x=>x.id===id);
  const wrap = document.getElementById(`fen-vantaux-wrap-${id}`);
  if(!wrap) return;
  // Met à jour la classe CSS selon le nombre de vantaux
  wrap.className = p.fenNbVantaux === 1 ? 'config-step'
                 : p.fenNbVantaux === 2 ? 'config-row2'
                 : 'config-row3';
  const labels = ['V1','V2','V3'];
  wrap.innerHTML = p.fenVantaux.map((v,i) => `
    <div class="config-step">
      <label>${labels[i]}</label>
      <select id="fen-v-${id}-${i}" onchange="onFenVantailOuvChange(${id},${i})">
        <option value="">— Ouvrant —</option>
        <option value="Fixe"   ${v.ouv==='Fixe'?'selected':''}>Fixe</option>
        <option value="OF"     ${v.ouv==='OF'?'selected':''}>OF (oscillo-battant)</option>
        <option value="OF+OB"  ${v.ouv==='OF+OB'?'selected':''}>OF + OB</option>
      </select>
    </div>`).join('');
}

function renderFenImposteOuv(id) {
  const p = produits.find(x=>x.id===id);
  const wrap = document.getElementById(`fen-imposte-ouv-wrap-${id}`);
  if(!wrap) return;
  if(!p.fenImposte) { wrap.style.display='none'; return; }
  const lbl = (p.type === 'porte-fenetre' || p.fenImposte === 'imposte') ? 'Ouverture imposte' : 'Ouverture allège';
  wrap.style.display = 'block';
  wrap.innerHTML = `
    <div class="config-step">
      <label>${lbl}</label>
      <select id="fen-imposte-ouv-${id}" onchange="onFenImpostOuvChange(${id})">
        <option value="">— Choisir —</option>
        <option value="Fixe" ${p.fenImpostOuv==='Fixe'?'selected':''}>Fixe</option>
        <option value="OB"   ${p.fenImpostOuv==='OB'?'selected':''}>OB (oscillo-battant)</option>
      </select>
    </div>`;
}

function onPfSeuilChange(id) {
  const p = produits.find(x=>x.id===id);
  p.pfSeuil = document.getElementById(`pf-seuil-${id}`)?.value || '';
  buildFenDesignation(id);
}

function buildFenDesignation(id) {
  const p = produits.find(x=>x.id===id);
  // Partie vantaux
  const ouvLabels = { 'Fixe':'Fixe', 'OF':'OF', 'OF+OB':'OF+OB' };
  const vParts = p.fenVantaux.map((v,i) => v.ouv ? `V${i+1}:${v.ouv}` : '').filter(Boolean);
  let ouvertureStr = '';
  if(p.fenNbVantaux === 1) {
    ouvertureStr = p.fenVantaux[0]?.ouv || '';
  } else {
    ouvertureStr = `${p.fenNbVantaux} vantaux${vParts.length ? ' ('+vParts.join(', ')+')' : ''}`;
  }
  // Imposte/allège
  let imposteStr = '';
  if(p.fenImposte) {
    imposteStr = p.fenImposte === 'imposte' ? 'Imposte' : 'Allège';
    if(p.fenImpostOuv) imposteStr += ` ${p.fenImpostOuv}`;
  }

  // Stocker dans p.ouverture pour la désignation commune
  p.ouverture = [ouvertureStr, imposteStr].filter(Boolean).join(' + ');
  // Seuil (porte-fenêtre uniquement)
  if(p.type === 'porte-fenetre' && p.pfSeuil) {
    const seuilLabel = p.pfSeuil === 'plat-alu' ? 'Seuil plat aluminium' : 'Seuil dormant fenêtre';
    p.ouverture = [p.ouverture, seuilLabel].filter(Boolean).join(' — ');
  }
  updateDesignation(id);
  renderSVG(id);
}

function refreshColorisSelects(id) {
  const p = produits.find(x=>x.id===id);
  const extWrap = document.getElementById(`col-ext-wrap-${id}`);
  const intWrap = document.getElementById(`col-int-wrap-${id}`);
  if(!extWrap || !intWrap) return;

  const m = p.colorisMode;

  if(!m || m === 'blanc') {
    extWrap.style.display='none';
    intWrap.style.display='none';
    return;
  }

  // plax-int : la couleur est INTÉRIEURE → on utilise col-int-wrap + colorisInt
  if(m === 'plax-int') {
    extWrap.style.display='none';
    intWrap.style.display='block';
    intWrap.querySelector('label').textContent = 'Couleur intérieure';
    const intSel = document.getElementById(`col-int-${id}`);
    if(intSel) { intSel.innerHTML = '<option value="">— Choisir —</option>' + paletteOptions(p.colorisInt); }
    return;
  }

  // plax-ext, plax-2f, bicolore : couleur extérieure dans col-ext-wrap
  extWrap.style.display='block';
  const extLabel = m === 'plax-2f' ? 'Couleur (2 faces)'
                 : m === 'bicolore' ? 'Couleur extérieure'
                 : 'Couleur extérieure';
  extWrap.querySelector('label').textContent = extLabel;
  const extSel = document.getElementById(`col-ext-${id}`);
  if(extSel) { extSel.innerHTML = '<option value="">— Choisir —</option>' + paletteOptions(p.colorisExt); }

  // bicolore : on affiche aussi la couleur intérieure
  if(m === 'bicolore') {
    intWrap.style.display='block';
    intWrap.querySelector('label').textContent = 'Couleur intérieure';
    const intSel = document.getElementById(`col-int-${id}`);
    if(intSel) { intSel.innerHTML = '<option value="">— Choisir —</option>' + paletteOptions(p.colorisInt); }
  } else {
    intWrap.style.display='none';
  }
}

function refreshColorisSelects(id) {
  const p = produits.find(x=>x.id===id);
  const wrapExt = document.getElementById(`col-ext-wrap-${id}`);
  const wrapInt = document.getElementById(`col-int-wrap-${id}`);
  const lblExt  = document.getElementById(`col-ext-lbl-${id}`);
  if(!wrapExt || !wrapInt) return;

  const m = p.colorisMode;
  // Ext visible pour : plax-ext, plax-2f, bicolore
  // Int visible pour : plax-int, bicolore
  const showExt = ['plax-ext','plax-2f','bicolore'].includes(m);
  const showInt = ['plax-int','bicolore'].includes(m);

  wrapExt.style.display = showExt ? 'block' : 'none';
  wrapInt.style.display = showInt ? 'block' : 'none';

  // Label dynamique
  if(lblExt) {
    if(m === 'plax-2f')    lblExt.textContent = 'Couleur (2 faces)';
    else if(m === 'bicolore') lblExt.textContent = 'Couleur extérieure';
    else                   lblExt.textContent = 'Couleur extérieure';
  }
}

function buildColorisLabel(p) {
  if(!p.colorisMode || p.colorisMode === 'blanc') return 'Blanc';
  const findNom = code => PALETTE_ALUPLAST.find(c=>c.code===code)?.nom || code;
  switch(p.colorisMode) {
    case 'plax-ext':  return `Plax. ext. ${findNom(p.colorisExt)} / int. Blanc`;
    case 'plax-int':  return `Plax. int. ${findNom(p.colorisInt)} / ext. Blanc`;
    case 'plax-2f':   return `Plax. 2 faces ${findNom(p.colorisExt)}`;
    case 'bicolore':  return `Bicolore ext. ${findNom(p.colorisExt)} / int. ${findNom(p.colorisInt)}`;
    default: return '';
  }
}

function refreshVitrage(id) {
  const p = produits.find(x=>x.id===id);
  const aspectWrap = document.getElementById(`vit-aspect-wrap-${id}`);
  const refWrap    = document.getElementById(`vit-ref-wrap-${id}`);
  const libreWrap  = document.getElementById(`vit-libre-wrap-${id}`);
  if(!aspectWrap) return;

  // Pas de type choisi → tout masqué
  if(!p.vitType) {
    aspectWrap.style.display='none';
    if(refWrap)   refWrap.style.display='none';
    if(libreWrap) libreWrap.style.display='none';
    return;
  }

  // Type = autre → saisie libre directement
  if(p.vitType === 'autre') {
    aspectWrap.style.display='none';
    if(refWrap)   refWrap.style.display='none';
    if(libreWrap) { libreWrap.style.display='block'; }
    return;
  }

  // Double ou triple → choix aspect
  aspectWrap.style.display='block';

  if(!p.vitAspect) {
    if(refWrap)   refWrap.style.display='none';
    if(libreWrap) libreWrap.style.display='none';
    return;
  }

  // Aspect = autre → saisie libre
  if(p.vitAspect === 'autre') {
    if(refWrap)   refWrap.style.display='none';
    if(libreWrap) { libreWrap.style.display='block'; }
    return;
  }

  // Clair ou opaque → liste de refs
  if(libreWrap) libreWrap.style.display='none';
  if(refWrap) {
    refWrap.style.display='block';
    const sel = document.getElementById(`vit-ref-${id}`);
    if(sel) {
      const refs = VITRAGE_OPTIONS[p.vitType]?.[p.vitAspect] || [];
      sel.innerHTML = '<option value="">— Choisir la composition —</option>'
        + refs.map(r=>`<option value="${r}" ${p.vitRef===r?'selected':''}>${r}</option>`).join('');
    }
  }
}

function buildVitrageDesignation(id) {
  const p = produits.find(x=>x.id===id);
  let label = '';
  if(p.vitType === 'autre' || p.vitAspect === 'autre') {
    label = p.vitLibre || '';
  } else if(p.vitType && p.vitAspect && p.vitRef) {
    const typeLabel = p.vitType === 'double' ? 'Double vitrage' : 'Triple vitrage';
    // Si clair : pas besoin de le préciser
    const aspectLabel = p.vitAspect === 'opaque' ? ' Opaque' : '';
    label = `${typeLabel}${aspectLabel} ${p.vitRef}`;
  } else if(p.vitType && p.vitAspect) {
    const typeLabel = p.vitType === 'double' ? 'Double vitrage' : 'Triple vitrage';
    const aspectLabel = p.vitAspect === 'opaque' ? ' Opaque' : '';
    label = `${typeLabel}${aspectLabel}`;
  } else if(p.vitType) {
    label = p.vitType === 'double' ? 'Double vitrage' : p.vitType === 'triple' ? 'Triple vitrage' : '';
  }
  p.vitrage = label;
  // Intercalaire bord chaud
  if(p.vitInter === 'oui' && p.vitInterRef) {
    p.vitrage += ` — ${p.vitInterRef}`;
  }
  // Croisillons
  if(p.vitCrois === 'oui' && p.vitCroisDim) {
    p.vitrage += ` — Croisillons ${p.vitCroisDim}`;
  }
  updateDesignation(id);
}

function buildVrLabel(p) {
  if(p.vrOui !== 'oui') return '';
  const parts = ['Volet roulant'];
  if(p.vrColExt) parts.push(`ext. ${p.vrColExt}`);
  if(p.vrColInt) parts.push(`int. ${p.vrColInt}`);
  if(p.vrTablier === 'alu' && p.vrTablierAlu) parts.push(`Tablier alu ${p.vrTablierAlu}`);
  else if(p.vrTablier === 'pvc' && p.vrTablierLib) parts.push(`Tablier PVC ${p.vrTablierLib}`);
  if(p.vrConsole === 'oui') parts.push('Renfort acier avec console statique');
  if(p.vrTablierCol) parts.push(`Coloris tablier: ${p.vrTablierCol}`);
  if(p.vrLameFinale) parts.push(`Lame finale: ${p.vrLameFinale}`);
  if(p.vrCommande === 'manuelle' && p.vrManuelle) parts.push(p.vrManuelle === 'sangle' ? 'Sangle' : 'Manivelle');
  else if(p.vrCommande === 'electrique') {
    if(p.vrElec === 'somfy' && p.vrSomfy) parts.push(`Somfy ${p.vrSomfy}`);
    else if(p.vrElec === 'basic') parts.push('Électrique basic');
    else if(p.vrElec === 'autre' && p.vrElecLib) parts.push(p.vrElecLib);
  }
  if(p.vrMoust === 'oui') parts.push('Moustiquaire intégrée');
  return parts.join(' — ');
}

function buildVrStandaloneLabel(p) {
  if(p.type !== 'volet') return '';
  const typeLabels = { exterieur:'Extérieur', monobloc:'Monobloc', caisson:'Remplissage caisson' };
  const parts = [];
  if(p.vrType) parts.push(typeLabels[p.vrType] || p.vrType);
  if(p.vrColExt) parts.push(`ext. ${p.vrColExt}`);
  if(p.vrColInt) parts.push(`int. ${p.vrColInt}`);
  if(p.vrTablier === 'alu' && p.vrTablierAlu) parts.push(`Tablier alu ${p.vrTablierAlu}`);
  else if(p.vrTablier === 'pvc' && p.vrTablierLib) parts.push(`Tablier PVC ${p.vrTablierLib}`);
  if(p.vrConsole === 'oui') parts.push('Renfort acier avec console statique');
  if(p.vrTablierCol) parts.push(`Coloris tablier: ${p.vrTablierCol}`);
  if(p.vrLameFinale) parts.push(`Lame finale: ${p.vrLameFinale}`);
  if(p.vrCommande === 'manuelle' && p.vrManuelle) parts.push(p.vrManuelle === 'sangle' ? 'Sangle' : 'Manivelle');
  else if(p.vrCommande === 'electrique') {
    if(p.vrElec === 'somfy' && p.vrSomfy) parts.push(`Somfy ${p.vrSomfy}`);
    else if(p.vrElec === 'basic') parts.push('Électrique basic');
    else if(p.vrElec === 'autre' && p.vrElecLib) parts.push(p.vrElecLib);
  }
  if(p.vrMoust === 'oui') parts.push('Moustiquaire intégrée');
  return parts.join(' — ');
}

function buildPeDesignation(id) {
  const p = produits.find(x=>x.id===id);
  const parts = [];
  if(p.peSens) parts.push(p.peSens === 'interieur' ? 'Ouverture intérieure' : 'Ouverture extérieure');
  if(p.peOuverture === 'special') {
    if(p.peSpecial) parts.push(p.peSpecial);
  } else {
    const found = PE_OUVERTURES.find(o => o.val === p.peOuverture);
    if(found) parts.push(found.lbl);
  }
  // Détail des éléments
  const elems = getPeElems(p.peOuverture);
  elems.forEach(elem => {
    const e = p.peElems[elem];
    if(!e || !e.type) return;
    const lbl = PE_ELEM_LABELS[elem] || elem;
    if(e.type === 'plein') {
      parts.push(`${lbl}: Plein`);
    } else if(e.type === 'deco' && e.deco) {
      parts.push(`${lbl}: Panneau ${e.deco}`);
    } else if(e.type === 'vitre') {
      let vitStr = '';
      if(e.vitType === 'autre' || e.vitAspect === 'autre') { vitStr = e.vitLibre; }
      else if(e.vitType && e.vitAspect && e.vitRef) {
        const tl = e.vitType === 'double' ? 'Double vitrage' : 'Triple vitrage';
        const al = e.vitAspect === 'opaque' ? ' Opaque' : '';
        vitStr = `${tl}${al} ${e.vitRef}`;
      } else if(e.vitType) {
        vitStr = e.vitType === 'double' ? 'Double vitrage' : 'Triple vitrage';
      }
      if(vitStr) parts.push(`${lbl}: ${vitStr}`);
      else parts.push(`${lbl}: Vitré`);
    }
  });
  p.ouverture = parts.join(' — ');
  updateDesignation(id);
}

function onBcNbVantauxChange(id) {
  const p = produits.find(x=>x.id===id);
  const n = parseInt(document.getElementById(`bc-nb-${id}`)?.value||2);
  p.bcNbVantaux = n;
  while(p.bcVantaux.length < n) p.bcVantaux.push({ouv:''});
  p.bcVantaux = p.bcVantaux.slice(0, n);
  renderBcVantaux(id);
  buildBcDesignation(id);
}

function onBcVantailChange(id, vi) {
  const p = produits.find(x=>x.id===id);
  p.bcVantaux[vi].ouv = document.getElementById(`bc-v-${id}-${vi}`)?.value || '';
  buildBcDesignation(id);
}

function renderBcVantaux(id) {
  const p = produits.find(x=>x.id===id);
  const wrap = document.getElementById(`bc-vantaux-wrap-${id}`);
  if(!wrap) return;
  wrap.className = p.bcNbVantaux <= 2 ? 'config-row2' : p.bcNbVantaux === 3 ? 'config-row3' : 'config-row2';
  wrap.innerHTML = p.bcVantaux.map((v,i) => `
    <div class="config-step">
      <label>V${i+1}</label>
      <select id="bc-v-${id}-${i}" onchange="onBcVantailChange(${id},${i})">
        <option value="">— Choisir —</option>
        <option value="fixe"       ${v.ouv==='fixe'       ?'selected':''}>Fixe</option>
        <option value="coulissant" ${v.ouv==='coulissant' ?'selected':''}>Coulissant</option>
      </select>
    </div>`).join('');
}

function buildBcDesignation(id) {
  const p = produits.find(x=>x.id===id);
  const vParts = p.bcVantaux.map((v,i) => v.ouv ? `V${i+1}:${v.ouv==='fixe'?'Fixe':'Coul.'}` : '').filter(Boolean);
  p.ouverture = `${p.bcNbVantaux} vantaux${vParts.length ? ' ('+vParts.join(', ')+')' : ''}`;
  updateDesignation(id);
}

function onPgChange(id, field, elId) {
  const p = produits.find(x=>x.id===id);
  const el = document.getElementById(elId);
  if(el) p[field] = el.value;

  // Refresh conditional blocks
  const secBlock  = document.getElementById(`pg-sec-block-${id}`);
  const batBlock  = document.getElementById(`pg-bat-block-${id}`);
  if(secBlock) secBlock.style.display = p.pgType === 'sectionnelle' ? 'block' : 'none';
  if(batBlock) batBlock.style.display = p.pgType === 'battante'     ? 'block' : 'none';

  const elecBlock = document.getElementById(`pg-elec-block-${id}`);
  if(elecBlock) elecBlock.style.display = p.pgCommande === 'electrique' ? 'block' : 'none';

  const somfyBlock = document.getElementById(`pg-somfy-block-${id}`);
  const autreBlock = document.getElementById(`pg-moteur-libre-block-${id}`);
  if(somfyBlock) somfyBlock.style.display = p.pgMoteur === 'somfy'  ? 'block' : 'none';
  if(autreBlock) autreBlock.style.display = p.pgMoteur === 'autre'  ? 'block' : 'none';

  buildPgDesignation(id);
}

function buildPgDesignation(id) {
  const p = produits.find(x=>x.id===id);
  if(p.pgType === 'battante') {
    p.designation = p.pgBattanteLib ? `Porte de garage Battante — ${p.pgBattanteLib}` : 'Porte de garage Battante';
  } else if(p.pgType === 'sectionnelle') {
    const parts = ['Porte de garage Sectionnelle'];
    if(p.pgModele) parts.push(`Infinity ${p.pgModele}`);
    if(p.pgLargeur && p.pgHauteur) parts.push(`${p.pgLargeur}×${p.pgHauteur}mm`);
    if(p.pgColoris) parts.push(p.pgColoris);
    if(p.pgSurface === 'lisse') parts.push('Lisse');
    else if(p.pgSurface === 'woodgrain') parts.push('Woodgrain');
    if(p.pgNervures === 'etroites') parts.push('Nervures étroites');
    else if(p.pgNervures === 'larges') parts.push('Nervures larges');
    else if(p.pgNervures === 'sans') parts.push('Sans nervures');
    if(p.pgCommande === 'manuel') parts.push('Manuel');
    else if(p.pgCommande === 'electrique') {
      if(p.pgMoteur === 'somfy' && p.pgSomfy) {
        const somfyLabel = p.pgSomfy === 'dexxo-compact' ? 'Somfy Dexxo Compact IO 750N' : 'Somfy Dexxo Smart IO';
        parts.push(somfyLabel);
      } else if(p.pgMoteur === 'autre' && p.pgMoteurLib) {
        parts.push(p.pgMoteurLib);
      } else {
        parts.push('Électrique');
      }
    }
    p.designation = parts.join(' — ');
  } else {
    p.designation = '';
  }
  if(p.notesProduit) p.designation += (p.designation ? '\n' : '') + p.notesProduit;
  const box = document.getElementById(`desig-${id}`);
  if(box) {
    if(p.designation) { box.textContent = p.designation; box.className = 'designation-box'; }
    else { box.textContent = 'La désignation apparaîtra ici au fur et à mesure de votre sélection…'; box.className = 'designation-box empty'; }
  }
  const sub = document.querySelector(`#card-${id} .card-subtitle`);
  if(sub) sub.textContent = p.designation || 'Configuration en cours…';
  updatePreview();
}

function handlePhotoUpload(id, field, input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const p = produits.find(x=>x.id===id);
    if(!p) return;
    p[field] = e.target.result; // data URL complet
    // Refresh preview thumbnail
    const preview = document.getElementById(`photo-preview-${field}-${id}`);
    const zone    = document.getElementById(`photo-zone-${field}-${id}`);
    if(preview) { preview.src = e.target.result; preview.style.display='block'; }
    if(zone)    { zone.querySelector('.photo-placeholder')?.style && (zone.querySelector('.photo-placeholder').style.display='none'); }
  };
  reader.readAsDataURL(file);
}

function removePhoto(id, field) {
  const p = produits.find(x=>x.id===id);
  if(!p) return;
  p[field] = '';
  const preview = document.getElementById(`photo-preview-${field}-${id}`);
  const zone    = document.getElementById(`photo-zone-${field}-${id}`);
  if(preview) { preview.src=''; preview.style.display='none'; }
  if(zone)    { const ph = zone.querySelector('.photo-placeholder'); if(ph) ph.style.display='flex'; }
}

function onNotesProduitChange(id) {

  const ref=document.getElementById(`autre-ref-${id}`); if(ref) p.autreRef=ref.value;

}
function buildAutreDesignation(id) {
  const p=produits.find(x=>x.id===id);
  const parts=[];
  if(p.autreDesig) parts.push(p.autreDesig);
  if(p.autreMatiere) parts.push(p.autreMatiere);

  if(p.autreDim) parts.push(p.autreDim+'mm');
  if(p.autreRef) parts.push(p.autreRef);
  p.designation = parts.join(' — ');
  const box=document.getElementById(`desig-${id}`);

function onDimChange(id) {

  // Console intégrée fenêtres/PF (vrOui=oui, largeur > 1800)
  const consoleWrap = document.getElementById(`vr-console-wrap-${id}`);
  if(consoleWrap) {
    const show = parseInt(p.largeur) >= 1800;
    consoleWrap.style.display = show ? 'block' : 'none';
    if(!show) p.vrConsole = '';
  }
  // Console volet standalone (monobloc > 1800)
  const consoleStandalone = document.getElementById(`vr-console-standalone-wrap-${id}`);
  if(consoleStandalone) {
    const show = p.vrType === 'monobloc' && parseInt(p.largeur) >= 1800;
    consoleStandalone.style.display = show ? 'block' : 'none';

  updateDesignation(id);
  renderSVG(id);
}

// ══════════════════════════════════════════════
// REFRESH SÉLECTS EN CASCADE (sans re-render complet)
// ══════════════════════════════════════════════
function refreshCascade(id) {
  const p = produits.find(x=>x.id===id);
  const cat = CATALOGUE[p.type];
  const mat = cat.matieres[p.matiere];

  // Fabricant
  const fabWrap = document.getElementById(`fab-wrap-${id}`);
  const fabLibreWrap = document.getElementById(`fab-libre-wrap-${id}`);
  if(!mat || !mat.hasFabricant) {
    if(fabWrap) fabWrap.style.display='none';
    if(fabLibreWrap) fabLibreWrap.style.display='none';
  } else {
    if(fabWrap) fabWrap.style.display='block';
    const sel = document.getElementById(`fab-${id}`);
    if(sel) {
      sel.innerHTML = '<option value="">— Choisir le fabricant —</option>';
      Object.keys(mat.fabricants).forEach(f => {
        sel.innerHTML += `<option value="${f}">${f}${mat.fabricants[f].type==='placeholder'?' (à compléter)':''}</option>`;
      });
      sel.disabled = false;
    }
    if(fabLibreWrap) fabLibreWrap.style.display='none';
  }

  // Gamme
  refreshGamme(id);

  // Ouverture (pas de select unique pour les fenêtres)
  if(p.type !== 'fenetre') {
    const ouvSel = document.getElementById(`ouv-${id}`);
    if(ouvSel) ouvSel.disabled = !p.matiere;
  }

  // Coloris : visible uniquement si PVC
  const colorisWrapId = p.type === 'porte-entree' ? `coloris-wrap-pe-${id}` : `coloris-wrap-${id}`;
  const colorisWrap = document.getElementById(colorisWrapId);
  if(colorisWrap) colorisWrap.style.display = p.matiere === 'PVC' ? 'block' : 'none';
}

function refreshGamme(id) {
  const p = produits.find(x=>x.id===id);
  const cat = CATALOGUE[p.type];
  const mat = cat.matieres[p.matiere];
  const gamWrap = document.getElementById(`gam-wrap-${id}`);
  const gamLibreWrap = document.getElementById(`gam-libre-wrap-${id}`);
  const fabLibreWrap = document.getElementById(`fab-libre-wrap-${id}`);

  if(!mat) {
    if(gamWrap) { gamWrap.style.display='block'; const s=document.getElementById(`gam-${id}`); if(s){s.innerHTML='<option value="">—</option>';s.disabled=true;} }
    if(gamLibreWrap) gamLibreWrap.style.display='none';
    if(fabLibreWrap) fabLibreWrap.style.display='none';
    return;
  }

  if(mat.hasFabricant) {
    const fab = mat.fabricants[p.fabricant];
    if(!fab) {
      if(gamWrap) { gamWrap.style.display='block'; const s=document.getElementById(`gam-${id}`); if(s){s.innerHTML='<option value="">— Choisir le fabricant d\'abord —</option>';s.disabled=true;} }
      if(gamLibreWrap) gamLibreWrap.style.display='none';
      if(fabLibreWrap) fabLibreWrap.style.display='none';
    } else if(fab.type === 'placeholder') {
      // Veka / Kömm : à compléter → saisie libre gamme
      if(gamWrap) gamWrap.style.display='none';
      if(gamLibreWrap) gamLibreWrap.style.display='block';
      if(fabLibreWrap) fabLibreWrap.style.display='none';
    } else if(fab.type === 'libre') {
      // Autre : saisie libre fabricant + gamme
      if(gamWrap) gamWrap.style.display='none';
      if(gamLibreWrap) gamLibreWrap.style.display='block';
      if(fabLibreWrap) fabLibreWrap.style.display='block';
    } else {
      // Catalogue Aluplast
      if(gamWrap) gamWrap.style.display='block';
      if(gamLibreWrap) gamLibreWrap.style.display='none';
      if(fabLibreWrap) fabLibreWrap.style.display='none';
      const sel = document.getElementById(`gam-${id}`);
      if(sel) {
        sel.innerHTML = '<option value="">— Choisir la gamme —</option>';
        fab.gammes.forEach(g => {
          const label = typeof g === 'object' ? `${g.gamme}${g.epaisseur?' ('+g.epaisseur+')':''}` : g;
          const val   = typeof g === 'object' ? g.gamme : g;
          sel.innerHTML += `<option value="${val}" ${p.gamme===val?'selected':''}>${label}</option>`;
        });
        sel.disabled = false;
      }
    }
  } else {
    // Pas de fabricant (Alu, Acier, Volet...)
    if(gamWrap) gamWrap.style.display='block';
    if(gamLibreWrap) gamLibreWrap.style.display='none';
    if(fabLibreWrap) fabLibreWrap.style.display='none';
    const sel = document.getElementById(`gam-${id}`);
    if(sel) {
      sel.innerHTML = '<option value="">— Choisir la gamme —</option>';
      mat.gammes.forEach(g => {
        sel.innerHTML += `<option value="${g}" ${p.gamme===g?'selected':''}>${g}</option>`;
      });
      sel.disabled = !p.matiere;
    }
  }
}

// ══════════════════════════════════════════════
// DÉSIGNATION AUTO
// ══════════════════════════════════════════════
function updateDesignation(id) {
  const p = produits.find(x=>x.id===id);
  const cat = CATALOGUE[p.type];
  // Garage : désignation gérée par buildPgDesignation
  if(p.type === 'garage') { buildPgDesignation(id); return; }
  const parts = [];
  if(p.matiere) parts.push(p.matiere);
  // PSK : Oscillo-battant juste après la matière
  if(p.type === 'baie-psk') parts.push('Oscillo-battant');
  // Fabricant
  if(p.fabricant) {
    const mat = cat.matieres[p.matiere];
    if(mat && mat.hasFabricant) {
      const fab = mat.fabricants[p.fabricant];
      if(fab && fab.type==='libre') {
        if(p.fabricantLibre) parts.push(p.fabricantLibre);
        else parts.push(p.fabricant);
      } else {
        parts.push(p.fabricant);
      }
    }
  }
  // Gamme
  if(p.gamme) {
    // Trouver l'épaisseur si Aluplast
    let epaisseur = '';
    const mat = cat.matieres[p.matiere];
    if(mat && mat.hasFabricant && mat.fabricants[p.fabricant] && mat.fabricants[p.fabricant].gammes) {
      const gObj = mat.fabricants[p.fabricant].gammes.find(g => (typeof g==='object' ? g.gamme : g) === p.gamme);
      if(gObj && typeof gObj === 'object' && gObj.epaisseur) epaisseur = ` (${gObj.epaisseur})`;
    }
    parts.push(p.gamme + epaisseur);
  } else if(p.gammeLibre) {
    parts.push(p.gammeLibre);
  }
  if(p.ouverture) parts.push(p.ouverture);
  if(p.largeur && p.hauteur) parts.push(`${p.largeur}×${p.hauteur}mm`);
  // Coloris (PVC uniquement) — une seule fois via buildColorisLabel
  if(p.matiere === 'PVC') {
    const colorisLabel = buildColorisLabel(p);
    if(colorisLabel) parts.push(colorisLabel);
  }
  if(p.vitrage && p.vitrage !== 'N/A') parts.push(p.vitrage);

  p.designation = parts.length > 0 ? `${cat.label} ${parts.join(' — ')}` : '';
  // Pièce d'appui
  if(p.pieceAppui === 'oui') p.designation += ' — Pièce d\'appui';
  // Volet roulant standalone
  if(p.type === 'volet') {
    const vrSLabel = buildVrStandaloneLabel(p);
    if(vrSLabel) p.designation += (p.designation ? ' — ' : '') + vrSLabel;
  }
  const vrLabel = buildVrLabel(p);
  if(vrLabel) p.designation += '\n' + vrLabel;
  // Volet roulant porte d'entrée (simplifié)
  if(p.type === 'porte-entree' && p.peVr === 'oui') {
    const peVrStr = p.peVrLib ? `Volet roulant — ${p.peVrLib}` : 'Volet roulant';
    p.designation += '\n' + peVrStr;
  }
  // Note libre produit
  if(p.notesProduit) p.designation += '\n' + p.notesProduit;

  const box = document.getElementById(`desig-${id}`);
  if(box) {
    if(p.designation) { box.textContent = p.designation; box.className='designation-box'; }
    else { box.textContent='La désignation apparaîtra ici au fur et à mesure de votre sélection…'; box.className='designation-box empty'; }
  }
  // Update card subtitle
  const sub = document.querySelector(`#card-${id} .card-subtitle`);
  if(sub) sub.textContent = p.designation || 'Configuration en cours…';
  updatePreview();
}

// ══════════════════════════════════════════════
// SVG DESSIN
// ══════════════════════════════════════════════
function renderSVG(id) {
  const p = produits.find(x=>x.id===id);
  const c = document.getElementById(`svg-container-${id}`);
  if(c) c.innerHTML = genSVG(p, 120, 140);
}

function genSVG(p, W, H) {
  const stroke='#0d1b2a', frameFill='#e8e4dc', glassFill='rgba(180,220,240,0.4)', arrow='#c8782a';
  if(!p.largeur||!p.hauteur) return `<svg width="${W}" height="${H}"><rect x="5" y="5" width="${W-10}" height="${H-10}" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#aaa" font-size="9">Entrez les dimensions</text></svg>`;
  const x=8,y=8,w=W-16,h=H-20;
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<text x="${W/2}" y="${H-3}" text-anchor="middle" fill="#888" font-size="7">${p.largeur}×${p.hauteur}mm</text>`;
  const ouv=p.ouverture||'';
  if(p.type==='volet'){
    svg+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${frameFill}" stroke="${stroke}" stroke-width="2"/>`;
    for(let i=0;i<8;i++) svg+=`<line x1="${x+4}" y1="${y+(h/8)*i+h/16}" x2="${x+w-4}" y2="${y+(h/8)*i+h/16}" stroke="${stroke}" stroke-width="1" opacity="0.4"/>`;
    svg+=`<rect x="${x}" y="${y}" width="${w}" height="10" fill="${stroke}" opacity="0.7"/>`;
  } else if(p.type==='garage'){
    svg+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${frameFill}" stroke="${stroke}" stroke-width="2"/>`;
    for(let i=0;i<4;i++) svg+=`<rect x="${x+4}" y="${y+(h/4)*i+2}" width="${w-8}" height="${h/4-4}" fill="white" stroke="${stroke}" stroke-width="0.5" rx="2"/>`;
  } else {
    svg+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${frameFill}" stroke="${stroke}" stroke-width="3"/>`;
    const n3=ouv.includes('3 vantaux')||ouv.includes('3 vantaux');
    const n2=ouv.includes('2 vantaux')||ouv.includes('2 vantaux');
    const isCoul=ouv.toLowerCase().includes('coulissant')||ouv.toLowerCase().includes('galandage')||['baie-psk','baie-coul'].includes(p.type);
    const isFixed=ouv==='Fixe';
    const hasImposte=ouv.includes('imposte');
    const ih=hasImposte?h*0.22:0;
    if(hasImposte) svg+=`<rect x="${x+3}" y="${y+3}" width="${w-6}" height="${ih}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
    if(n3){
      const vw=(w-7)/3;
      for(let i=0;i<3;i++){
        const vx=x+3+i*(vw+1.5), vy=y+3+ih, vh=h-6-ih;
        svg+=`<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
        if(!isFixed){const cx=vx+vw/2,cy=vy+vh/2,dir=(i===0&&!isCoul)?-1:1;svg+=`<line x1="${cx}" y1="${cy-8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrow}" stroke-width="1.5"/><line x1="${cx}" y1="${cy+8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrow}" stroke-width="1.5"/>`;}
      }
    } else if(n2){
      const vw=(w-7)/2, vh=h-6-ih;
      for(let i=0;i<2;i++){
        const vx=x+3+i*(vw+1), vy=y+3+ih;
        svg+=`<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
        if(!isCoul){const cx=vx+vw/2,cy=vy+vh/2,dir=i===0?-1:1;svg+=`<line x1="${cx}" y1="${cy-8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrow}" stroke-width="1.5"/><line x1="${cx}" y1="${cy+8}" x2="${cx+dir*10}" y2="${cy}" stroke="${arrow}" stroke-width="1.5"/>`;}
        else{svg+=`<line x1="${vx+4}" y1="${vy+vh/2}" x2="${vx+vw-4}" y2="${vy+vh/2}" stroke="${arrow}" stroke-width="1.2"/>`;}
      }
    } else {
      const vh=h-6-ih;
      svg+=`<rect x="${x+3}" y="${y+3+ih}" width="${w-6}" height="${vh}" fill="${glassFill}" stroke="${stroke}" stroke-width="1.5"/>`;
      if(!isFixed&&!isCoul){const cx=x+3+(w-6)/2,cy=y+3+ih+vh/2;svg+=`<line x1="${cx}" y1="${cy-10}" x2="${cx+12}" y2="${cy}" stroke="${arrow}" stroke-width="1.5"/><line x1="${cx}" y1="${cy+10}" x2="${cx+12}" y2="${cy}" stroke="${arrow}" stroke-width="1.5"/>`;}
    }
  }
  svg+='</svg>';
  return svg;
}

function getPrixTotal(p) {
  return ((p.prixUnitaire||0) + (p.withPose ? (p.prixPose||0) : 0)) * (p.quantite||1);
}

// VITRAGE CONFIG HTML (généré dans le template)

function vitrageConfigHTML(p) {
  const id = p.id;
  const IS = `style="width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit"`;

  // Volet → N/A
  if(p.type === 'volet') {
    return `<label style="font-size:9px;letter-spacing:1.5px;color:var(--copper);text-transform:uppercase">⑤ Vitrage</label>
      <div style="font-size:11px;color:var(--text-muted);padding:4px 0">N/A</div>`;
  }

  // Garage / autre → liste simple
  if(VITRAGE_SIMPLE_TYPES.includes(p.type)) {
    const opts = (CATALOGUE[p.type]?.vitrages||[]).map(v=>`<option value="${v}" ${p.vitrage===v?'selected':''}>${v}</option>`).join('');
    return `<label style="font-size:9px;letter-spacing:1.5px;color:var(--copper);text-transform:uppercase;display:block;margin-bottom:4px">⑤ Vitrage</label>
      <select id="vit-${id}" onchange="onVitrageChange(${id})" ${IS}>
        <option value="">— Choisir —</option>${opts}
      </select>`;
  }

  // Porte d'entrée → liste type/aspect de fenêtre
  if(VITRAGE_PORTE_TYPES.includes(p.type)) {
    const opts = VIT_PORTE.map(v=>`<option value="${v}" ${p.vitrage===v?'selected':''}>${v}</option>`).join('');
    return `<label style="font-size:9px;letter-spacing:1.5px;color:var(--copper);text-transform:uppercase;display:block;margin-bottom:4px">⑤ Vitrage</label>
      <select id="vit-${id}" onchange="onVitrageChange(${id})" ${IS}>
        <option value="">— Choisir —</option>${opts}
      </select>`;
  }

  // Tous les autres : cascade Double/Triple → Clair/Opaque → Composition
  const showAspect = p.vitType && p.vitType !== 'autre';
  const showRef    = showAspect && p.vitAspect && p.vitAspect !== 'autre';
  const showLibre  = p.vitType === 'autre' || p.vitAspect === 'autre';

  const refOpts = showRef
    ? (VITRAGE_OPTIONS[p.vitType]?.[p.vitAspect]||[])
        .map(r=>`<option value="${r}" ${p.vitRef===r?'selected':''}>${r}</option>`).join('')
    : '';

  return `
    <label style="font-size:9px;letter-spacing:1.5px;color:var(--copper);text-transform:uppercase;display:block;margin-bottom:6px">⑤ Vitrage</label>
    <div class="config-step" style="margin-bottom:6px">
      <label>Type</label>
      <select id="vit-type-${id}" onchange="onVitTypeChange(${id})">
        <option value="">— Choisir —</option>
        <option value="double" ${p.vitType==='double'?'selected':''}>Double vitrage</option>
        <option value="triple" ${p.vitType==='triple'?'selected':''}>Triple vitrage</option>
        <option value="autre"  ${p.vitType==='autre' ?'selected':''}>Autre (saisie libre)</option>
      </select>
    </div>
    <div class="config-step" id="vit-aspect-wrap-${id}" style="${showAspect?'':'display:none'};margin-bottom:6px">
      <label>Aspect</label>
      <select id="vit-aspect-${id}" onchange="onVitAspectChange(${id})">
        <option value="">— Clair / Opaque —</option>
        <option value="clair"  ${p.vitAspect==='clair' ?'selected':''}>Clair</option>
        <option value="opaque" ${p.vitAspect==='opaque'?'selected':''}>Opaque</option>
        <option value="autre"  ${p.vitAspect==='autre' ?'selected':''}>Autre</option>
      </select>
    </div>
    <div class="config-step" id="vit-ref-wrap-${id}" style="${showRef?'':'display:none'}">
      <label>Composition</label>
      <select id="vit-ref-${id}" onchange="onVitRefChange(${id})">
        <option value="">— Choisir la composition —</option>
        ${refOpts}
      </select>
    </div>
    <div class="config-step" id="vit-libre-wrap-${id}" style="${showLibre?'':'display:none'}">
      <label>Composition (saisie libre)</label>
      <input type="text" id="vit-libre-${id}" value="${p.vitLibre||''}" placeholder="Ex: 4/16Ar/4 Planitherm…" oninput="onVitLibreChange(${id})" ${IS}>
    </div>
    <div class="cascade-sep" style="margin-top:8px"></div>
    <div class="config-row2" style="margin-top:8px">
      <div class="config-step">
        <label>Intercalaire bord chaud</label>
        <select id="vit-inter-${id}" onchange="onVitInterChange(${id})">
          <option value="">— Choisir —</option>
          <option value="non" ${p.vitInter==='non'?'selected':''}>Non</option>
          <option value="oui" ${p.vitInter==='oui'?'selected':''}>Oui</option>
        </select>
      </div>
      <div class="config-step" id="vit-inter-ref-wrap-${id}" style="${p.vitInter==='oui'?'':'display:none'}">
        <label>Référence</label>
        <select id="vit-inter-ref-${id}" onchange="onVitInterRefChange(${id})">
          <option value="">— Choisir —</option>
          <option value="Swisspacer Ultimate" ${p.vitInterRef==='Swisspacer Ultimate'?'selected':''}>Swisspacer Ultimate</option>
          <option value="Chromatech Ultra"    ${p.vitInterRef==='Chromatech Ultra'   ?'selected':''}>Chromatech Ultra</option>
        </select>
      </div>
    </div>
    <div class="config-row2" style="margin-top:8px">
      <div class="config-step">
        <label>Croisillons</label>
        <select id="vit-crois-${id}" onchange="onVitCroisChange(${id})">

          <option value="non" ${p.vitCrois==='non'?'selected':''}>Non</option>
          <option value="oui" ${p.vitCrois==='oui'?'selected':''}>Oui</option>
        </select>
      </div>
      <div class="config-step" id="vit-crois-dim-wrap-${id}" style="${p.vitCrois==='oui'?'':'display:none'}">
        <label>Dimensions</label>
        <input type="text" id="vit-crois-dim-${id}" value="${p.vitCroisDim||''}" placeholder="Ex: 18×18mm" oninput="onVitCroisDimChange(${id})" ${IS}>
      </div>
    </div>`;
}

  // Porte de garage : configurateur dédié sans matière

    return `

  const colInt = PALETTE_ALUPLAST.map(c => `<option value="${c.code}" ${p.colorisInt===c.code?'selected':''}>${c.code} — ${c.nom}</option>`).join('');
  const showColExt = ['plax-ext','plax-2f','bicolore'].includes(p.colorisMode);
  const showColInt = ['plax-int','bicolore'].includes(p.colorisMode);

  const colorisBlock = !isPE ? `
    <div id="coloris-wrap-${id}" style="${p.matiere==='PVC'?'':'display:none'}">
      <div class="cascade-sep" style="margin-top:10px"></div>

          <option value="plax-int" ${p.colorisMode==='plax-int'?'selected':''}>Plaxage intérieur / extérieur blanc</option>

        <select id="col-ext-${id}" onchange="onColorisExtChange(${id})">
          <option value="">— Choisir dans la palette —</option>${colExt}

      </div>
      <div id="col-int-wrap-${id}" class="config-step" style="${showColInt?'':'display:none'}">

  // Bloc non-fenetre / non-PF / non-PE : configurateurs vantaux BC et autres

  const bcVantauxClass = p.bcNbVantaux <= 2 ? 'config-row2' : p.bcNbVantaux === 3 ? 'config-row3' : 'config-row2';
  const bcVantauxHTML = p.bcVantaux.map((v,i) => `
    <div class="config-step">
      <label>V${i+1}</label>

  const ouvertureStdBlock = !isFenPF && !isPE ? `
    ${isVr ? voletStandaloneHTML(p) : isBc ? bcBlock : `
    <div class="config-row2">
      <div class="config-step">
        <label>④ Ouverture</label>
        <select id="ouv-${id}" onchange="onOuvertureChange(${id})" ${ouvDis}>
          <option value="">— Type d'ouverture —</option>${ouvOpts}
        </select>
      </div>
    </div>`}
    ${!isVr ? `
    <div class="cascade-sep" style="margin-top:10px"></div>
    <div class="config-row2" style="margin-top:8px">

  return `

function renderProduits() {
  const container = document.getElementById('produits-container');
  if(!container) return;
  container.innerHTML = '';

  produits.forEach(p => {
    const cat = CATALOGUE[p.type] || CATALOGUE['autre'];
    const total = getPrixTotal(p);

    // Matière options
    const matOpts = Object.keys(cat.matieres).map(m =>
      `<option value="${m}" ${p.matiere===m?'selected':''}>${m}</option>`
    ).join('');

    // Fabricant options (initial)
    const mat = cat.matieres[p.matiere];
    let fabHide = (!mat || !mat.hasFabricant) ? 'display:none' : '';
    let fabOpts = '<option value="">— Choisir le fabricant —</option>';
    if(mat && mat.hasFabricant) {
      Object.keys(mat.fabricants).forEach(f => {
        fabOpts += `<option value="${f}" ${p.fabricant===f?'selected':''}>${f}${mat.fabricants[f].type==='placeholder'?' (à compléter)':''}</option>`;
      });
    }

    // Gamme select (initial)
    let gamHide = '', gamLibreHide = 'display:none', fabLibreHide = 'display:none';
    let gamOpts = '<option value="">— Choisir la gamme —</option>';
    let gamDis = 'disabled';
    if(mat) {
      if(mat.hasFabricant) {
        const fab = mat.fabricants[p.fabricant];
        if(!fab) { gamDis='disabled'; }
        else if(fab.type==='placeholder') { gamHide='display:none'; gamLibreHide=''; }
        else if(fab.type==='libre') { gamHide='display:none'; gamLibreHide=''; fabLibreHide=''; }
        else {
          gamDis='';
          fab.gammes.forEach(g => {
            const label = typeof g==='object' ? `${g.gamme}${g.epaisseur?' ('+g.epaisseur+')':''}` : g;
            const val   = typeof g==='object' ? g.gamme : g;
            gamOpts += `<option value="${val}" ${p.gamme===val?'selected':''}>${label}</option>`;
          });
        }
      } else {
        gamDis = p.matiere ? '' : 'disabled';
        mat.gammes && mat.gammes.forEach(g => {
          gamOpts += `<option value="${g}" ${p.gamme===g?'selected':''}>${g}</option>`;
        });
      }
    }

    // Ouverture options
    let ouvOpts = '<option value="">— Type d\'ouverture —</option>';
    if(cat.ouvertures) cat.ouvertures.forEach(o => ouvOpts += `<option value="${o}" ${p.ouverture===o?'selected':''}>${o}</option>`);
    const ouvDis = p.matiere ? '' : 'disabled';

    const desigContent = p.designation || 'La désignation apparaîtra ici au fur et à mesure de votre sélection…';
    const desigClass = p.designation ? 'designation-box' : 'designation-box empty';
    const svgHtml = genSVG(p, 120, 140);

    // Input style helper (to avoid repeating long style strings)
    const IS = `style="background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;width:100%"`;

    container.insertAdjacentHTML('beforeend', `
    <div class="product-card" id="card-${p.id}">
      <div class="product-card-header" onclick="toggleCard(${p.id})">
        <div class="card-num">${p.id}</div>
        <div style="flex:1">
          <div class="card-title">${p.numero} — ${cat.label}</div>
          <div class="card-subtitle">${p.designation||'Configuration en cours…'}</div>
        </div>
        <div class="card-total" id="card-total-${p.id}">${fmtEur(total)}</div>
        <button class="btn-del" onclick="event.stopPropagation();supprimerProduit(${p.id})">✕</button>
        <span class="card-toggle ${p.open?'open':''}">▼</span>
      </div>
      <div class="product-card-body ${p.open?'open':''}">
        <div class="tabs">
          <div class="tab active" onclick="switchTab(${p.id},'config',this)">Configuration</div>
          <div class="tab" onclick="switchTab(${p.id},'dessin',this)">Dessin</div>
          <div class="tab" onclick="switchTab(${p.id},'prix',this)">Prix</div>
        </div>

        <!-- CONFIG -->
        <div id="tab-config-${p.id}">
          ${p.type === 'autre' ? autreConfigHTML(p, IS, desigContent, desigClass) : standardConfigHTML(p, IS, matOpts, fabHide, fabOpts, gamHide, gamOpts, gamDis, gamLibreHide, fabLibreHide, ouvOpts, ouvDis, desigContent, desigClass)}
          <div class="cascade-sep" style="margin-top:10px"></div>
          <div class="config-step" style="margin-top:8px">
            <label style="font-size:9px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase">Note / Spécificités techniques</label>
            <textarea id="notes-produit-${p.id}" rows="2" placeholder="Ex : Renforts spéciaux, contraintes de pose, remarques…" oninput="onNotesProduitChange(${p.id})" style="width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:inherit;resize:vertical">${p.notesProduit||''}</textarea>
          </div>
        </div>
        </div>

        <!-- DESSIN -->
        <div id="tab-dessin-${p.id}" style="display:none">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:4px 0">
            <div>
              <div style="font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px">Vue intérieure</div>
              <div class="photo-zone" id="photo-zone-photoInt-${p.id}" onclick="document.getElementById('photo-input-photoInt-${p.id}').click()">
                <input type="file" id="photo-input-photoInt-${p.id}" accept="image/*" style="display:none" onchange="handlePhotoUpload(${p.id},'photoInt',this)">
                <img id="photo-preview-photoInt-${p.id}" src="${p.photoInt||''}" style="width:100%;height:100%;object-fit:cover;${p.photoInt?'':'display:none'}">
                <div class="photo-placeholder" style="${p.photoInt?'display:none':''}">
                  <span class="icon">📷</span>
                  <span>Cliquer pour ajouter</span>
                </div>
                ${p.photoInt?`<button class="photo-remove" onclick="event.stopPropagation();removePhoto(${p.id},'photoInt')">✕</button>`:''}
              </div>
            </div>
            <div>
              <div style="font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px">Vue extérieure</div>
              <div class="photo-zone" id="photo-zone-photoExt-${p.id}" onclick="document.getElementById('photo-input-photoExt-${p.id}').click()">
                <input type="file" id="photo-input-photoExt-${p.id}" accept="image/*" style="display:none" onchange="handlePhotoUpload(${p.id},'photoExt',this)">
                <img id="photo-preview-photoExt-${p.id}" src="${p.photoExt||''}" style="width:100%;height:100%;object-fit:cover;${p.photoExt?'':'display:none'}">
                <div class="photo-placeholder" style="${p.photoExt?'display:none':''}">
                  <span class="icon">📷</span>
                  <span>Cliquer pour ajouter</span>
                </div>
                ${p.photoExt?`<button class="photo-remove" onclick="event.stopPropagation();removePhoto(${p.id},'photoExt')">✕</button>`:''}
              </div>
            </div>
          </div>
        </div>

        <!-- PRIX -->
        <div id="tab-prix-${p.id}" style="display:none">
          <div class="form-grid g3" style="margin-bottom:8px">
            <div class="form-group">
              <label>Quantité</label>
              <input type="number" id="qty-${p.id}" value="${p.quantite}" min="1" step="1" oninput="onQtyChange(${p.id})" ${IS}>
            </div>
            <div class="form-group" style="grid-column:span 2">
              <label>Prix fourniture HT (€)</label>
              <input type="number" id="prix-${p.id}" value="${p.prixUnitaire}" min="0" step="1" placeholder="0,00" oninput="onPrixChange(${p.id})" ${IS}>
            </div>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="pose-cb-${p.id}" ${p.withPose?'checked':''} onchange="onPoseToggle(${p.id})">
            <label for="pose-cb-${p.id}">Inclure la pose</label>
          </div>
          <div id="pose-row-${p.id}" class="form-grid g2" style="margin-top:8px;display:${p.withPose?'grid':'none'}">
            <div class="form-group">
              <label>Prix pose HT (€)</label>
              <input type="number" id="prixpose-${p.id}" value="${p.prixPose}" min="0" step="1" placeholder="0,00" oninput="onPrixPoseChange(${p.id})" ${IS}>
            </div>
          </div>
          <div style="margin-top:10px;padding:8px 12px;background:rgba(200,120,42,0.08);border:1px solid var(--border);border-radius:6px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:11px;color:var(--text-muted)">Total ligne HT</span>
            <span style="font-size:15px;color:var(--gold);font-weight:700" id="card-total2-${p.id}">${fmtEur(total)}</span>
          </div>
        </div>
      </div>
    </div>`);
  });
}

function getTotaux() {
  const tva=parseFloat(document.getElementById('tva-select')?.value||10);
  const ht=produits.reduce((s,p)=>s+getPrixTotal(p),0);
  return {ht, tva, tvaAmt:ht*tva/100, ttc:ht+ht*tva/100};
}

        doc.text(line, textX, ty);
        doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...dark);
      } else {
        doc.setFontSize(6.5);
        doc.text(line, textX, ty);
      }
      ty += lineH;
    });

    // Total aligné à droite
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...navy);
    doc.text(fmtEur(getPrixTotal(p)), W-m-2, y+rowH-3, {align:'right'});

    y+=rowH; even=!even;
  });
  y+=4;

  // Totaux
  const totX=W-m-60;
  [[`Sous-total HT`,fmtEur(ht)],[`TVA ${tva}%`,fmtEur(tvaAmt)]].forEach(([l,v])=>{
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
    doc.text(l,totX,y+4); doc.text(v,W-m,y+4,{align:'right'});
    doc.setDrawColor(238,238,238); doc.line(totX,y+6,W-m,y+6); y+=7;
  });
  doc.setFillColor(...lightBg); doc.rect(totX-2,y,W-m-totX+2,9,'F');
  doc.setDrawColor(...copper); doc.setLineWidth(0.7); doc.line(totX-2,y,W-m,y);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...navy);
  doc.text('TOTAL TTC',totX,y+7); doc.setTextColor(180,130,40); doc.text(fmtEur(ttc),W-m,y+7,{align:'right'});
  y+=15;

  // Conditions
  const acompte=document.getElementById('acompte')?.value||'30';
  const validite=document.getElementById('validite')?.value||'30';
  const delai=document.getElementById('delai')?.value||'';
  const notes=document.getElementById('notes')?.value||'';
  doc.setFillColor(...lightBg); doc.rect(m,y,W-m*2,38,'F');
  let cy=y+5;
  doc.setFontSize(7); doc.setTextColor(...gray);
  if(acompte){doc.setFont('helvetica','bold');doc.text('Acompte : ',m+3,cy);doc.setFont('helvetica','normal');doc.text(`${acompte}% à la commande, soit ${fmtEur(ttc*parseFloat(acompte)/100)}`,m+22,cy);cy+=5;}
  if(validite){doc.setFont('helvetica','bold');doc.text('Validité : ',m+3,cy);doc.setFont('helvetica','normal');doc.text(`${validite} jours à compter du ${dateStr}`,m+22,cy);cy+=5;}
  if(delai){doc.setFont('helvetica','bold');doc.text('Délai : ',m+3,cy);doc.setFont('helvetica','normal');doc.text(delai,m+22,cy);cy+=5;}
  // RIB
  doc.setFont('helvetica','bold');doc.text('RIB : ',m+3,cy);
  doc.setFont('helvetica','normal');doc.text('IBAN FR76 1627 5006 0008 0031 5707 168  ·  BIC CEPAFRPP627',m+14,cy);cy+=5;
  if(notes){doc.setFont('helvetica','bold');doc.text('Remarques : ',m+3,cy);doc.setFont('helvetica','normal');doc.text(notes.substring(0,100),m+28,cy);}
  y+=43;

  // Signature client uniquement
  const sw=W-m*2;
  doc.setDrawColor(220,220,220); doc.setLineWidth(0.3); doc.rect(m,y,sw,18,'D');
  doc.setFontSize(6.5); doc.setTextColor(...gray);
  doc.text('BON POUR ACCORD  —  Signature client :',m+3,y+5);
  y+=22;

  // Footer
  doc.setFillColor(...navy); doc.rect(0,H-12,W,12,'F');
  doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(138,154,176);
  doc.text('Fenyx Ouvertures  ·  SIREN 101574127  ·  133 rue Louis Montois 59790 Ronchin',W/2,H-5,{align:'center'});

  const pdfBlob = doc.output('blob');
  const url = URL.createObjectURL(pdfBlob);
  window.open(url, '_blank');
}

// ══════════════════════════════════════════════
// RÉINITIALISER
// ══════════════════════════════════════════════
function reinitialiser() {
  if(!confirm('Réinitialiser le devis ? Toutes les données seront perdues.')) return;
  produits=[]; nextId=1; devisNum=getDevisNum();
  ['clientNom','clientTel','clientEmail','clientAdresse','devisDate','notes','delai'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('devisDate').value=new Date().toISOString().split('T')[0];
  const numInput=document.getElementById('devisNumInput'); if(numInput) numInput.value=devisNum;
  document.getElementById('acompte').value='30';
  document.getElementById('validite').value='30';
  renderProduits(); updatePreview();
}

// INIT
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('devisDate').value=new Date().toISOString().split('T')[0];
  const numInput = document.getElementById('devisNumInput');
  if(numInput) numInput.value = devisNum;
  updatePreview();
});
</script>
